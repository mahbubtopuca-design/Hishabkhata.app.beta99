<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#f0f4ff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="দোকানখাতা"/>
<link rel="manifest" href="manifest.json"/>
<title>দোকানখাতা</title>
<style>
/* ════════════════════════════════════════════════
   দোকানখাতা — index.html (CSS + Structure only)
   Logic এর জন্য app.js দেখুন
   ════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg:#eef2ff;
  --glass:rgba(255,255,255,0.68);
  --glass2:rgba(255,255,255,0.45);
  --glass3:rgba(255,255,255,0.88);
  --border:rgba(99,102,241,0.12);
  --border2:rgba(99,102,241,0.22);
  --text:#1e1b4b;--sub:#6b7280;--sub2:#9ca3af;
  --blur:blur(18px);--blur2:blur(28px);
  --shadow:0 4px 20px rgba(99,102,241,0.10);
  --shadow2:0 8px 36px rgba(99,102,241,0.16);
  --radius:16px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}

/* LIGHT GRADIENT BACKGROUND */
body::before{content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#e0e7ff 0%,#fce7f3 28%,#ecfdf5 60%,#fefce8 100%)}

/* ANIMATED BLOBS */
.blob-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(55px);animation:bF 9s ease-in-out infinite}
.b1{width:280px;height:280px;background:rgba(139,92,246,.18);top:-90px;left:-70px;animation-delay:0s}
.b2{width:240px;height:240px;background:rgba(236,72,153,.15);top:30%;right:-70px;animation-delay:2.5s}
.b3{width:210px;height:210px;background:rgba(6,182,212,.15);bottom:28%;left:-50px;animation-delay:5s}
.b4{width:190px;height:190px;background:rgba(16,185,129,.15);bottom:-55px;right:18%;animation-delay:7s}
@keyframes bF{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-16px) scale(1.04)}}

/* APP SHELL */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
#topbar{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border2);padding:11px 16px;
  padding-top:max(11px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 12px rgba(99,102,241,0.08)}
.shop-name{font-weight:900;font-size:16px;color:var(--text)}
.shop-badge{background:linear-gradient(135deg,#16a34a,#15803d);border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;color:#fff;margin-left:6px}
.icon-btn{background:var(--glass2);backdrop-filter:var(--blur);border:1px solid var(--border2);color:var(--sub);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:15px;font-family:inherit;display:flex;align-items:center;justify-content:center}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:12px 13px;padding-bottom:85px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{display:none}

/* BOTTOM NAV */
#bottomnav{position:fixed;bottom:0;left:0;right:0;
  background:var(--glass3);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  border-top:1px solid var(--border2);display:flex;align-items:center;z-index:100;
  padding-bottom:max(8px,env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(99,102,241,0.08)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;border:none;background:transparent;cursor:pointer;font-family:inherit;gap:2px}
.bnav-icon{font-size:18px;line-height:1;transition:transform .15s}
.bnav-label{font-size:9px;font-weight:600;color:var(--sub2);transition:color .15s}
.bnav-btn.active .bnav-label{color:#16a34a}
.bnav-btn.active .bnav-icon{transform:scale(1.18)}
.bnav-center{flex:0 0 66px;display:flex;justify-content:center;align-items:center}
.add-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#15803d);
  border:3px solid rgba(255,255,255,.75);cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(22,163,74,0.38);font-size:26px;color:#fff;transition:transform .15s}
.add-fab:active{transform:scale(.9)}

/* GLASS CARD */
.gc{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:var(--radius);box-shadow:var(--shadow)}

/* NET MUNAFA HERO */
.net-hero{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border:1px solid var(--border2);border-radius:var(--radius);
  padding:15px 17px;margin-bottom:0;box-shadow:var(--shadow2);
  display:flex;justify-content:space-between;align-items:center;position:relative;overflow:hidden}
.net-hero::before{content:'';position:absolute;top:-25px;right:-25px;width:90px;height:90px;border-radius:50%;background:rgba(22,163,74,0.07)}
.nh-label{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px}
.nh-val{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1}
.nh-sub{font-size:11px;color:var(--sub);margin-top:4px}
.nh-right{text-align:right;font-size:11px;color:var(--sub);line-height:2}

/* MUNAFA ROW */
.munafa-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.munafa-card{border-radius:14px;padding:12px 13px;position:relative;overflow:hidden}
.munafa-card::after{content:'';position:absolute;top:-10px;right:-10px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.25)}
.m-label{font-size:9px;font-weight:700;opacity:.8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.m-big{font-size:20px;font-weight:900;letter-spacing:-.5px;line-height:1}
.m-sub{font-size:9px;opacity:.7;margin-top:2px}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.stat-card{border-radius:14px;padding:12px 13px;cursor:pointer;transition:transform .1s;position:relative;overflow:hidden}
.stat-card:active{transform:scale(.96)}
.stat-card::after{content:'';position:absolute;bottom:-8px;right:-8px;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.2)}
.sc-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.sc-val{font-size:18px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.sc-sub{font-size:9px;opacity:.75;margin-top:2px}
.sc-bd{display:flex;gap:10px;margin-top:7px;padding-top:7px;border-top:1px solid rgba(255,255,255,.3)}
.sc-bd-label{font-size:8px;opacity:.7;font-weight:600}
.sc-bd-val{font-size:11px;font-weight:800;margin-top:1px}

/* TODAY ROW */
.today-row{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:0}
.today-card{border-radius:12px;padding:10px;text-align:center;backdrop-filter:var(--blur)}
.tc-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.tc-val{font-size:14px;font-weight:900;margin-top:3px}

/* QUICK ACTIONS */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:0}
.qbtn{border-radius:12px;padding:11px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border:1.5px solid;text-align:center;transition:transform .1s;backdrop-filter:var(--blur)}
.qbtn:active{transform:scale(.95)}

/* TX ITEM */
.tx-item{padding:10px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:10px}
.tx-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.tx-meta{font-size:10px;color:var(--sub);margin-top:2px}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.tx-amt{font-weight:900;font-size:14px;white-space:nowrap}
.chip{display:inline-block;border-radius:20px;padding:2px 8px;font-size:9px;font-weight:700}
.act-row{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.a-btn{border-radius:6px;padding:4px 8px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid;font-family:inherit;white-space:nowrap;background:transparent}

/* JOURNEY SHEET */
#journeyOverlay{position:fixed;inset:0;background:rgba(30,27,75,.4);z-index:3000;display:none;align-items:flex-end;backdrop-filter:blur(8px)}
#journeyOverlay.open{display:flex}
#journeySheet{background:var(--glass3);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-radius:26px 26px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;
  padding-bottom:max(20px,env(safe-area-inset-bottom));border-top:1px solid var(--border2);
  transform:translateY(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
#journeyOverlay.open #journeySheet{transform:translateY(0)}
.j-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.j-head{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between}
.j-step{font-size:11px;color:var(--sub);font-weight:600}
.j-body{padding:18px;overflow-y:auto;flex:1}
.j-q{font-size:21px;font-weight:900;margin-bottom:5px;line-height:1.3;color:var(--text)}
.j-hint{font-size:13px;color:var(--sub);margin-bottom:18px}

/* NUMPAD */
.num-display{background:var(--glass2);border:2px solid var(--border2);border-radius:14px;padding:14px;margin-bottom:14px;text-align:center}
.num-amount{font-size:42px;font-weight:900;color:#16a34a;letter-spacing:-2px;line-height:1}
.num-sub-text{font-size:12px;color:var(--sub);margin-top:4px}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.num-btn{background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:12px;padding:16px 8px;font-size:22px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;transition:all .1s;text-align:center;box-shadow:var(--shadow)}
.num-btn:active{background:var(--glass2);transform:scale(.93)}
.num-btn.del{font-size:17px;color:var(--sub)}
.j-next{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;box-shadow:0 4px 14px rgba(22,163,74,.25)}
.j-next:active{opacity:.8}
.j-next:disabled{background:var(--glass2);color:var(--sub);box-shadow:none}

/* TYPE / SUBTYPE CARDS */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-card{background:var(--glass);backdrop-filter:var(--blur);border:2px solid var(--border);border-radius:16px;padding:16px 12px;text-align:center;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:var(--shadow)}
.type-card:active{transform:scale(.95)}
.t-icon{font-size:28px;margin-bottom:6px}
.t-name{font-size:14px;font-weight:800;margin-bottom:3px;color:var(--text)}
.t-desc{font-size:11px;color:var(--sub);line-height:1.4}
.subtype-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.subtype-card{background:var(--glass);backdrop-filter:var(--blur);border:2px solid var(--border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;font-family:inherit;transition:all .15s}
.subtype-card:active{transform:scale(.95)}
.st-icon{font-size:24px;margin-bottom:5px}
.st-name{font-size:13px;font-weight:800;margin-bottom:2px;color:var(--text)}
.st-desc{font-size:10px;color:var(--sub);line-height:1.3}

/* SUGGEST */
.suggest-wrap{position:relative}
.suggest-list{position:absolute;top:100%;left:0;right:0;background:var(--glass3);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:12px;z-index:100;box-shadow:var(--shadow2);max-height:160px;overflow-y:auto;margin-top:4px}
.suggest-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--text)}
.suggest-item:last-child{border-bottom:none}
.suggest-item:active{background:var(--glass2)}

/* FORM */
.j-field{margin-bottom:12px}
.j-field label{display:block;font-size:10px;font-weight:700;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.j-inp{width:100%;background:var(--glass2);color:var(--text);border:1.5px solid var(--border2);border-radius:10px;padding:12px;font-size:15px;outline:none;font-family:inherit;transition:border .15s}
.j-inp:focus{border-color:#16a34a}
.j-btn{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;width:100%;font-family:inherit;box-shadow:0 4px 14px rgba(22,163,74,.25)}
.j-btn:active{opacity:.8}

/* SUCCESS */
.suc-wrap{text-align:center;padding:8px 0}
.suc-icon{font-size:60px;margin-bottom:12px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.suc-title{font-size:21px;font-weight:900;margin-bottom:6px;color:var(--text)}
.suc-sub{font-size:13px;color:var(--sub);margin-bottom:18px;line-height:1.5}
.suc-summary{background:var(--glass2);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:14px;text-align:left}
.suc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border);color:var(--text)}
.suc-row:last-child{border-bottom:none;font-weight:800;font-size:15px;padding-top:8px}
.suc-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-btn{border:none;border-radius:12px;padding:13px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* DETAIL SHEET */
#detailOverlay{position:fixed;inset:0;background:rgba(30,27,75,.35);z-index:2000;display:none;align-items:flex-end;backdrop-filter:blur(6px)}
#detailOverlay.open{display:flex}
#detailSheet{background:var(--glass3);backdrop-filter:blur(28px);border-radius:24px 24px 0 0;width:100%;max-height:88vh;display:flex;flex-direction:column;padding-bottom:max(20px,env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .3s;border-top:1px solid var(--border2)}
#detailOverlay.open #detailSheet{transform:translateY(0)}
.d-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 8px}
.d-head{padding:8px 18px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.d-title{font-size:16px;font-weight:800;color:var(--text)}
.d-close{background:var(--glass2);border:1px solid var(--border2);color:var(--sub);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;font-family:inherit}
.d-body{padding:16px;overflow-y:auto;flex:1}

/* NOTIF / ACTION BUTTONS */
.wa-btn{background:rgba(22,163,74,.12);color:#16a34a;border:1px solid #16a34a;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.sms-btn{background:rgba(37,99,235,.12);color:#2563eb;border:1px solid #2563eb;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.settle-btn{background:rgba(22,163,74,.12);color:#16a34a;border:1px solid #16a34a;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.adai-btn{background:rgba(234,88,12,.12);color:#ea580c;border:1px solid #ea580c;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.del-btn{background:rgba(220,38,38,.12);color:#dc2626;border:1px solid #dc2626;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* LEDGER */
.led-card{margin-bottom:8px;overflow:hidden}
.led-head{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.led-head:active{opacity:.8}
.led-body{border-top:1px solid var(--border);padding:12px;display:none}

/* FILTER ROW */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;border:1.5px solid var(--border2);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--glass2);backdrop-filter:var(--blur);color:var(--sub);white-space:nowrap;transition:all .15s}
.fbtn.active{border-color:#16a34a;color:#16a34a;background:rgba(22,163,74,.1)}

/* BARS */
.bar-track{background:var(--glass2);border-radius:999px;height:7px;overflow:hidden;margin-top:4px}
.bar-fill{height:100%;border-radius:999px;transition:width .6s}

/* INSTALL BANNER */
#installBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(124,58,237,.92);backdrop-filter:blur(10px);padding:10px 14px;flex-direction:row;align-items:center;gap:10px}
.ib-text{flex:1;font-size:12px;color:rgba(255,255,255,.85)}
.ib-text b{color:#fff;font-size:13px;display:block}
.ib-btn{border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

/* TOAST */
#toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none;box-shadow:var(--shadow2)}

/* EMPTY */
.empty{text-align:center;padding:28px 0;color:var(--sub)}
.empty-icon{font-size:40px;margin-bottom:8px}
.empty-text{font-size:13px;line-height:1.7;color:var(--sub)}
</style>
</head>
<body>

<!-- BLOBS -->
<div class="blob-bg">
  <div class="blob b1"></div><div class="blob b2"></div>
  <div class="blob b3"></div><div class="blob b4"></div>
</div>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <span style="font-size:22px">📒</span>
  <div class="ib-text"><b>দোকানখাতা ইন্সটল করুন</b>হোম স্ক্রিনে অ্যাপ হিসেবে</div>
  <button class="ib-btn" style="background:#fff;color:#7c3aed;margin-right:5px" onclick="installApp()">ইন্সটল</button>
  <button class="ib-btn" style="background:rgba(255,255,255,.2);color:#fff" onclick="dismissInstall()">✕</button>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div id="topbar">
    <div style="display:flex;align-items:center">
      <div class="shop-name" id="shopNameDisplay">📒 দোকানখাতা</div>
      <span class="shop-badge">লাইভ</span>
    </div>
    <div style="display:flex;gap:7px;align-items:center">
      <div style="font-size:10px;color:var(--sub);text-align:right;line-height:1.6" id="topDate"></div>
      <button class="icon-btn" onclick="openDetail('settings')">⚙️</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- BOTTOM NAV -->
  <div id="bottomnav">
    <button class="bnav-btn active" id="bn-home" onclick="goTab('home')"><span class="bnav-icon">🏠</span><span class="bnav-label">হোম</span></button>
    <button class="bnav-btn" id="bn-inventory" onclick="showToast('শীঘ্রই আসছে...','#7c3aed')"><span class="bnav-icon">📦</span><span class="bnav-label">ইনভেন্টরি</span></button>
    <button class="bnav-btn" id="bn-tagada" onclick="goTab('tagada')"><span class="bnav-icon">📣</span><span class="bnav-label">তাগাদা</span></button>
    <div class="bnav-center"><button class="add-fab" onclick="startJourney()">＋</button></div>
    <button class="bnav-btn" id="bn-history" onclick="goTab('history')"><span class="bnav-icon">📋</span><span class="bnav-label">ইতিহাস</span></button>
    <button class="bnav-btn" id="bn-ledger" onclick="goTab('ledger')"><span class="bnav-icon">📒</span><span class="bnav-label">লেজার</span></button>

<!-- LOGIC — app.js আলাদা ফাইলে আছে -->

<script>
// দোকানখাতা — app.js v1.6
// fixes: #8 দেনা/পাওনা bug | #3 phone book | #4 cost price | #5 partial pay | #6 তাগাদা | #7 supplier order

const LS=k=>{try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];}};
const SS=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let txns=LS('dk_txns');
(()=>{let ch=false;[{k:'dk_income',t:'income',s:'nogod'},{k:'dk_expense',t:'expense',s:'nogod'},{k:'dk_receivable',t:'receivable',s:'baki'},{k:'dk_payable',t:'payable',s:'baki'}].forEach(({k,t,s})=>{LS(k).forEach(r=>{if(!txns.find(x=>x.id===r.id)){txns.push({...r,type:t,subtype:s});ch=true;}});});if(ch)SS('dk_txns',txns);})();

const uid=()=>Date.now()+Math.random().toString(36).slice(2,6);
const BDT=n=>'৳'+Number(n||0).toLocaleString('en-BD',{minimumFractionDigits:0,maximumFractionDigits:0});
const BDT2=n=>'৳'+Number(n||0).toLocaleString('en-BD',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().split('T')[0];
const monthOf=d=>(d||'').slice(0,7);
const curMonth=()=>new Date().toISOString().slice(0,7);
const MONTHS_S=['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টে','অক্টো','নভে','ডিসে'];
const shopName=()=>localStorage.getItem('dk_shop')||'দোকানখাতা';

// fix #8: সঠিক definition
// পাওনা = আমি পাব (customer আমাকে দেবে) → receivable
// দেনা = আমি দেব (supplier কে দিতে হবে) → payable
const TINFO={
  income:    {icon:'💚',color:'#16a34a',bg:'rgba(22,163,74,.12)',  label:'আয়'},
  expense:   {icon:'🔴',color:'#dc2626',bg:'rgba(220,38,38,.12)',  label:'ব্যয়'},
  receivable:{icon:'🔵',color:'#2563eb',bg:'rgba(37,99,235,.12)',  label:'পাওনা'},
  payable:   {icon:'🟠',color:'#ea580c',bg:'rgba(234,88,12,.12)',  label:'দেনা'},
};

function save(){SS('dk_txns',txns);}
function getAllParties(){
  const m={};
  txns.filter(t=>t.party&&(t.type==='receivable'||t.type==='payable')).forEach(t=>{
    if(!m[t.party])m[t.party]={name:t.party,phone:t.phone||''};
  });
  return Object.values(m);
}

// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;if(!localStorage.getItem('installDismissed'))document.getElementById('installBanner').style.display='flex';});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').style.display='none';});}}
function dismissInstall(){document.getElementById('installBanner').style.display='none';localStorage.setItem('installDismissed','1');}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js');

// Back button
window.addEventListener('popstate',()=>{if(currentTab!=='home')goTab('home');});
function pushState(){history.pushState({tab:currentTab},'','');}

function updateTopbar(){
  document.getElementById('shopNameDisplay').textContent='📒 '+shopName();
  const now=new Date();
  const days=['রবি','সোম','মঙ্গল','বুধ','বৃহঃ','শুক্র','শনি'];
  document.getElementById('topDate').innerHTML=`${days[now.getDay()]}<br>${now.getDate()} ${MONTHS_S[now.getMonth()]}`;
}
function showToast(msg,bg='#16a34a'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=bg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2400);}

let currentTab='home',currentFilter='all',ledgerFilter='all',reportPeriod='monthly',dashPeriod='monthly',tagadaFilter='all';
function goTab(t,filter){
  currentTab=t;
  if(filter)currentFilter=filter;
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('bn-'+t);if(b)b.classList.add('active');
  if(t!=='home')pushState();
  renderContent();
}

// ─── JOURNEY ─────────────────────────────────────────
let J={step:0,amount:0,costPrice:0,type:'',subtype:'',party:'',phone:'',note:'',date:'',dueDate:'',category:''};
let numStr='',numMode='amount'; // numMode: 'amount' | 'cost'

function startJourney(){
  J={step:0,amount:0,costPrice:0,type:'',subtype:'',party:'',phone:'',note:'',date:today(),dueDate:'',category:''};
  numStr='';numMode='amount';
  document.getElementById('journeyOverlay').classList.add('open');
  jRender(0);
}
function closeJourney(){document.getElementById('journeyOverlay').classList.remove('open');document.getElementById('jBody').innerHTML='';}
function journeyBack(){if(J.step===0){closeJourney();return;}if(J.step===3)jRender(2);else if(J.step===2)jRender(1);else jRender(J.step-1);}

function jRender(step){
  J.step=step;
  const body=document.getElementById('jBody');
  const stepEl=document.getElementById('jStep');

  // STEP 0: Amount
  if(step===0){
    stepEl.textContent='ধাপ ১ / ৪';
    numMode='amount';
    body.innerHTML=`<div class="j-q">কত টাকার লেনদেন?</div><div class="j-hint">বিক্রয়মূল্য দিন</div>
    <div class="num-display"><div class="num-amount" id="numDisp">${J.amount>0?BDT(J.amount):'০'}</div><div class="num-sub-text">বাংলাদেশি টাকা (৳)</div></div>
    <div class="num-grid">${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="num-btn" onclick="nPress('${n}')">${n}</button>`).join('')}<button class="num-btn" onclick="nPress('00')">00</button><button class="num-btn" onclick="nPress('0')">0</button><button class="num-btn del" onclick="nDel()">⌫</button></div>
    <button class="j-next" id="jNext" onclick="jRender(1)" ${J.amount===0?'disabled':''}>পরবর্তী →</button>`;
  }

  // STEP 1: Type
  else if(step===1){
    stepEl.textContent='ধাপ ২ / ৪';
    // fix #8: সঠিক description
    body.innerHTML=`<div class="j-q">${BDT(J.amount)} টাকা কীসের?</div><div class="j-hint">একটা বেছে নিন</div>
    <div class="type-grid">${[
      {k:'income',   icon:'💚',name:'আয়',   desc:'পণ্য বিক্রয় বা অন্য আয়'},
      {k:'expense',  icon:'🔴',name:'ব্যয়',  desc:'পণ্য কেনা বা খরচ'},
      {k:'receivable',icon:'🔵',name:'পাওনা', desc:'গ্রাহকের কাছ থেকে পাব'},
      {k:'payable',  icon:'🟠',name:'দেনা',  desc:'সরবরাহকারীকে দিতে হবে'},
    ].map(t=>`<button class="type-card${J.type===t.k?' sel':''}" style="${J.type===t.k?`border-color:${TINFO[t.k].color};background:${TINFO[t.k].bg}`:''}" onclick="selectType('${t.k}')"><div class="t-icon">${t.icon}</div><div class="t-name" style="color:${TINFO[t.k].color}">${t.name}</div><div class="t-desc">${t.desc}</div></button>`).join('')}</div>`;
  }

  // STEP 2: Subtype
  else if(step===2){
    stepEl.textContent='ধাপ ৩ / ৪';
    if(J.type==='receivable'||J.type==='payable'){jRender(3);return;}
    const isI=J.type==='income';
    body.innerHTML=`<div class="j-q" style="color:${TINFO[J.type].color}">${isI?'বিক্রয় কীভাবে?':'কেনাকাটা কীভাবে?'}</div><div class="j-hint">নগদ নাকি বাকিতে?</div>
    <div class="subtype-grid">
      <button class="subtype-card${J.subtype==='nogod'?' sel':''}" style="${J.subtype==='nogod'?`border-color:${TINFO[J.type].color};background:${TINFO[J.type].bg}`:''}" onclick="selectSubtype('nogod')">
        <div class="st-icon">💵</div><div class="st-name" style="color:${TINFO[J.type].color}">${isI?'নগদ বিক্রয়':'নগদ ক্রয়'}</div><div class="st-desc">এখনই টাকা ${isI?'পেয়েছি':'দিয়েছি'}</div>
      </button>
      <button class="subtype-card${J.subtype==='baki'?' sel':''}" style="${J.subtype==='baki'?`border-color:${isI?'#2563eb':'#ea580c'};background:${isI?'rgba(37,99,235,.12)':'rgba(234,88,12,.12)'}`:''}" onclick="selectSubtype('baki')">
        <div class="st-icon">📝</div><div class="st-name" style="color:${isI?'#2563eb':'#ea580c'}">${isI?'বাকি বিক্রয়':'বাকিতে ক্রয়'}</div><div class="st-desc">পরে টাকা ${isI?'পাব':'দেব'}</div>
      </button>
    </div>`;
  }

  // STEP 3: Details
  else if(step===3){
    stepEl.textContent='ধাপ ৪ / ৪';
    const info=TINFO[J.type];
    const isIncome=J.type==='income';
    const needParty=J.type==='receivable'||J.type==='payable'||(isIncome&&J.subtype==='baki')||(J.type==='expense'&&J.subtype==='baki');
    const cats=isIncome?(J.subtype==='baki'?['বিক্রয় (Sales)','অন্যান্য']:['বিক্রয় (Sales)','বোনাস','ফেরত পণ্য','অন্যান্য']):J.type==='expense'?['পণ্য ক্রয়','বেতন','ভাড়া','বিদ্যুৎ','পরিবহন','অন্যান্য']:[];
    window._ps=getAllParties().map(p=>p.name).join('|||');

    body.innerHTML=`<div class="j-q" style="color:${info.color}">${info.icon} বিস্তারিত</div><div class="j-hint">প্রয়োজনীয়টা দিন</div>

    ${cats.length?`<div class="j-field"><label>বিভাগ</label><select class="j-inp" id="j_cat">${cats.map(c=>`<option${c===J.category?' selected':''}>${c}</option>`).join('')}</select></div>`:''}

    <!-- fix #4: ক্রয়মূল্য (income হলেই দেখাবে) -->
    ${isIncome?`<div class="j-field">
      <label>বিক্রিত পণ্যের ক্রয়মূল্য</label>
      <div class="num-display" style="padding:10px;margin-bottom:0;text-align:left;display:flex;align-items:center;justify-content:space-between">
        <span style="color:var(--sub);font-size:13px">ক্রয়মূল্য:</span>
        <span id="costDisp" style="font-size:20px;font-weight:900;color:#dc2626">${J.costPrice>0?BDT(J.costPrice):'০'}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px">
        ${[1,2,3,'⌫',4,5,6,0,7,8,9,'00'].map(n=>`<button onclick="costPress('${n}')" style="background:var(--glass2);border:1px solid var(--border2);border-radius:8px;padding:10px 4px;font-size:16px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit">${n}</button>`).join('')}
      </div>
      ${J.amount>0&&J.costPrice>0?`<div style="margin-top:6px;padding:8px;background:rgba(22,163,74,.08);border-radius:8px;font-size:12px;color:#16a34a;font-weight:600">মুনাফা: ${BDT(J.amount-J.costPrice)} (${Math.round((J.amount-J.costPrice)/J.amount*100)}%)</div>`:''}
    </div>`:''}

    ${needParty?`
      <div class="j-field"><label>${isIncome||(J.type==='receivable')?'👤 গ্রাহকের নাম *':'👤 সরবরাহকারীর নাম *'}</label>
        <div class="suggest-wrap">
          <div style="display:flex;gap:6px">
            <input class="j-inp" id="j_party" placeholder="নাম লিখুন বা বেছে নিন" value="${J.party}" oninput="showSuggest(this.value)" autocomplete="off" style="flex:1"/>
            <!-- fix #3: phone book button -->
            <button onclick="pickFromContacts()" style="background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;border-radius:10px;padding:10px 12px;color:#fff;font-size:18px;cursor:pointer" title="ফোনবুক থেকে বেছে নিন">📱</button>
          </div>
          <div class="suggest-list" id="suggestList" style="display:none"></div>
        </div>
      </div>
      <div class="j-field"><label>📱 ফোন নম্বর</label><input class="j-inp" type="tel" id="j_phone" placeholder="01XXXXXXXXX" inputmode="tel" value="${J.phone}"/></div>
      <div class="j-field"><label>${isIncome||(J.type==='receivable')?'কবে আদায় করব?':'কবে পরিশোধ করব?'}</label><input class="j-inp" type="date" id="j_due" value="${J.dueDate}"/></div>
    `:''}

    <div class="j-field"><label>তারিখ</label><input class="j-inp" type="date" id="j_date" value="${J.date}"/></div>
    <div class="j-field"><label>নোট (ঐচ্ছিক)</label><input class="j-inp" id="j_note" placeholder="পণ্যের নাম বা মন্তব্য..." value="${J.note}"/></div>
    <button class="j-btn" onclick="jSave()">সংরক্ষণ করুন ✓</button>`;
  }

  // STEP 4: Success
  else if(step===4){
    stepEl.textContent='✓ সম্পন্ন';
    const info=TINFO[J.type];
    const hasNotif=J.phone&&(J.type==='receivable'||J.type==='payable'||J.subtype==='baki');
    const profit=J.type==='income'&&J.costPrice>0?J.amount-J.costPrice:null;
    body.innerHTML=`<div class="suc-wrap">
      <div class="suc-icon">${info.icon}</div>
      <div class="suc-title" style="color:${info.color}">সংরক্ষিত হয়েছে!</div>
      <div class="suc-sub">${J.party?J.party+'-এর ':''} ${info.label} যোগ হয়েছে</div>
      <div class="suc-summary">
        <div class="suc-row"><span style="color:var(--sub)">ধরন</span><span style="color:${info.color}">${info.icon} ${info.label} ${J.subtype==='baki'?'(বাকি)':'(নগদ)'}</span></div>
        <div class="suc-row"><span style="color:var(--sub)">বিক্রয়মূল্য</span><span style="color:${info.color};font-weight:900">${BDT2(J.amount)}</span></div>
        ${J.costPrice>0?`<div class="suc-row"><span style="color:var(--sub)">ক্রয়মূল্য</span><span style="color:#dc2626">${BDT2(J.costPrice)}</span></div>`:''}
        ${profit!==null?`<div class="suc-row"><span style="color:var(--sub)">মুনাফা</span><span style="color:#16a34a;font-weight:900">${BDT2(profit)} (${Math.round(profit/J.amount*100)}%)</span></div>`:''}
        ${J.party?`<div class="suc-row"><span style="color:var(--sub)">পার্টি</span><span>${J.party}</span></div>`:''}
        <div class="suc-row"><span style="color:var(--sub)">তারিখ</span><span>${J.date}</span></div>
      </div>
      ${hasNotif?`<div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--sub);margin-bottom:8px;font-weight:600">📱 ${J.party}-কে notification:</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button class="wa-btn" style="padding:12px;font-size:13px;border-radius:10px" onclick="sendWA('${J.phone}','${J.party}',${J.amount},'${J.dueDate}','${J.type}')">📱 WhatsApp</button>
          <button class="sms-btn" style="padding:12px;font-size:13px;border-radius:10px" onclick="sendSMS('${J.phone}','${J.party}',${J.amount},'${J.dueDate}','${J.type}')">💬 SMS</button>
        </div></div>`:''}
      <div class="suc-btns">
        <button class="s-btn" style="background:var(--glass2);color:var(--sub);border:1px solid var(--border2)" onclick="closeJourney();renderContent()">✓ শেষ</button>
        <button class="s-btn" style="background:linear-gradient(135deg,#16a34a,#15803d);color:#fff" onclick="startJourney()">＋ আরেকটি</button>
      </div>
    </div>`;
  }
}

// Numpad — amount
function nPress(v){if(!numStr&&v==='00')return;numStr+=v;if(numStr.length>10)numStr=numStr.slice(0,-1);J.amount=parseInt(numStr)||0;const d=document.getElementById('numDisp');if(d)d.textContent=J.amount>0?BDT(J.amount):'০';const n=document.getElementById('jNext');if(n)n.disabled=J.amount===0;}
function nDel(){numStr=numStr.slice(0,-1);J.amount=parseInt(numStr)||0;const d=document.getElementById('numDisp');if(d)d.textContent=J.amount>0?BDT(J.amount):'০';const n=document.getElementById('jNext');if(n)n.disabled=J.amount===0;}

// fix #4: Cost price numpad
let costStr='';
function costPress(v){
  if(v==='⌫'){costStr=costStr.slice(0,-1);}
  else{if(!costStr&&v==='00')return;costStr+=v;if(costStr.length>10)costStr=costStr.slice(0,-1);}
  J.costPrice=parseInt(costStr)||0;
  const d=document.getElementById('costDisp');if(d)d.textContent=J.costPrice>0?BDT(J.costPrice):'০';
  // update profit preview
  const prev=document.querySelector('[id^="profitPrev"]');
  if(J.amount>0&&J.costPrice>0){
    const profitDiv=document.querySelector('.profit-preview');
    if(profitDiv)profitDiv.innerHTML=`মুনাফা: ${BDT(J.amount-J.costPrice)} (${Math.round((J.amount-J.costPrice)/J.amount*100)}%)`;
  }
}

function selectType(t){J.type=t;J.subtype='';if(t==='income')J.category='বিক্রয় (Sales)';else if(t==='expense')J.category='পণ্য ক্রয়';jRender(2);}
function selectSubtype(s){J.subtype=s;jRender(3);}

// fix #3: Phone book contact picker
async function pickFromContacts(){
  if(!('contacts' in navigator&&'ContactsManager' in window)){
    showToast('এই ডিভাইসে ফোনবুক অ্যাক্সেস সমর্থিত নয়','#dc2626');
    return;
  }
  try{
    const props=['name','tel'];
    const contacts=await navigator.contacts.select(props,{multiple:false});
    if(contacts&&contacts.length>0){
      const c=contacts[0];
      const name=(c.name&&c.name[0])||'';
      let phone='';
      if(c.tel&&c.tel.length>0){
        // clean phone number - remove spaces, dashes, country code formatting
        phone=c.tel[0].replace(/[\s\-\(\)]/g,'');
        if(phone.startsWith('+880'))phone='0'+phone.slice(4);
        else if(phone.startsWith('880')&&phone.length>10)phone='0'+phone.slice(3);
      }
      const inp=document.getElementById('j_party');
      const ph=document.getElementById('j_phone');
      if(inp&&name)inp.value=name;
      if(ph&&phone)ph.value=phone;
      J.party=name;J.phone=phone;
      document.getElementById('suggestList').style.display='none';
      showToast('যোগাযোগ যোগ করা হয়েছে ✓');
    }
  }catch(e){
    showToast('ফোনবুক অ্যাক্সেস করা যায়নি','#dc2626');
  }
}

function showSuggest(val){
  const list=document.getElementById('suggestList');if(!list)return;
  const all=(window._ps||'').split('|||').filter(x=>x);
  const filtered=val?all.filter(n=>n.toLowerCase().includes(val.toLowerCase())):all;
  let html='';
  if(filtered.length)html+=filtered.slice(0,5).map(n=>`<div class="suggest-item" onclick="pickSuggest('${n}')"><span>👤</span><span>${n}</span></div>`).join('');
  if(val&&!filtered.find(n=>n===val))html+=`<div class="suggest-item" style="color:#16a34a;font-weight:700" onclick="pickSuggest('${val}')"><span>➕</span><span>"${val}" নতুন যোগ করুন</span></div>`;
  list.innerHTML=html;list.style.display=html?'block':'none';
}
function pickSuggest(name){
  const inp=document.getElementById('j_party');const list=document.getElementById('suggestList');
  if(inp)inp.value=name;if(list)list.style.display='none';J.party=name;
  const known=getAllParties().find(p=>p.name===name);
  if(known&&known.phone){const ph=document.getElementById('j_phone');if(ph)ph.value=known.phone;J.phone=known.phone;}
}

function jSave(){
  const needParty=J.type==='receivable'||J.type==='payable'||(J.type==='income'&&J.subtype==='baki')||(J.type==='expense'&&J.subtype==='baki');
  if(document.getElementById('j_cat'))J.category=document.getElementById('j_cat').value||'';
  if(needParty){
    J.party=document.getElementById('j_party')?.value?.trim()||'';
    J.phone=document.getElementById('j_phone')?.value?.trim()||'';
    J.dueDate=document.getElementById('j_due')?.value||'';
    if(!J.party){alert('নাম দিন');return;}
  }
  J.date=document.getElementById('j_date')?.value||today();
  J.note=document.getElementById('j_note')?.value||'';
  // fix #4: costPrice save
  const item={id:uid(),type:J.type,subtype:J.subtype,amount:J.amount,costPrice:J.costPrice||0,date:J.date,note:J.note,party:J.party,phone:J.phone,dueDate:J.dueDate,category:J.category,settled:false,paidAmount:0};
  txns.unshift(item);
  // fix #3: বাকিতে বিক্রয় → payable (গ্রাহক দেনাদার, আমাকে দেবে)
  // বাকিতে ক্রয় → receivable (সরবরাহকারী পাওনাদার, আমি দেব)
  if(J.type==='income'&&J.subtype==='baki')
    txns.unshift({id:uid(),type:'payable',subtype:'baki',amount:J.amount,costPrice:0,date:J.date,note:'বাকি বিক্রয়'+(J.note?' — '+J.note:''),party:J.party,phone:J.phone,dueDate:J.dueDate,category:J.category,settled:false,paidAmount:0,linkedId:item.id});
  if(J.type==='expense'&&J.subtype==='baki')
    txns.unshift({id:uid(),type:'receivable',subtype:'baki',amount:J.amount,costPrice:0,date:J.date,note:'বাকিতে ক্রয়'+(J.note?' — '+J.note:''),party:J.party,phone:J.phone,dueDate:J.dueDate,category:J.category,settled:false,paidAmount:0,linkedId:item.id});
  save();updateTopbar();jRender(4);
}

// ─── NOTIFICATIONS ───────────────────────────────────
function sendWA(phone,party,amount,dueDate,type){
  // fix #8: receivable = আমি পাব, payable = আমি দেব
  const txt=type==='receivable'?'বাকি পাওনা আছে':'বাকি দেনা আছে';
  const action=type==='receivable'?'পরিশোধ করুন':'আদায় করুন';
  const msg=`📒 *${shopName()}*\n\nপ্রিয় *${party}*,\n\nআপনার কাছে *${BDT2(amount)}* টাকা ${txt}।${dueDate?'\nতারিখ: *'+dueDate+'*':''}\n\nঅনুগ্রহ করে ${action}। ধন্যবাদ 🙏`;
  let num=phone.replace(/\D/g,'');if(num.startsWith('0'))num='880'+num.slice(1);if(!num.startsWith('880'))num='880'+num;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}
function sendSMS(phone,party,amount,dueDate,type){
  const txt=type==='receivable'?'বাকি পাওনা':'বাকি দেনা';
  window.open(`sms:${phone.replace(/\D/g,'')}?body=${encodeURIComponent(`${shopName()}: ${party}, ৳${amount} ${txt}।${dueDate?' তারিখ: '+dueDate+'.':''} ধন্যবাদ।`)}`,'_self');
}

// fix #5: Partial payment
function partialPay(id){
  const t=txns.find(x=>x.id===id);if(!t)return;
  const remaining=t.amount-(t.paidAmount||0);
  const overlay=document.createElement('div');
  overlay.id='partialOverlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;backdrop-filter:blur(6px)';
  overlay.innerHTML=`<div style="background:var(--glass3,#fff);backdrop-filter:blur(20px);border-radius:24px 24px 0 0;width:100%;padding:20px;border-top:1px solid var(--border2);padding-bottom:max(20px,env(safe-area-inset-bottom))">
    <div style="font-weight:800;font-size:16px;color:var(--text);margin-bottom:4px">💰 আংশিক পরিশোধ</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:16px">${t.party} — বাকি: <b style="color:${t.type==='receivable'?'#2563eb':'#ea580c'}">${BDT(remaining)}</b></div>
    <div class="j-field"><label>পরিশোধের পরিমাণ</label>
      <input class="j-inp" type="number" id="partialAmt" placeholder="টাকার পরিমাণ দিন" inputmode="numeric" max="${remaining}" style="font-size:20px;font-weight:700"/>
    </div>
    <div class="j-field"><label>তারিখ</label><input class="j-inp" type="date" id="partialDate" value="${today()}"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
      <button onclick="document.getElementById('partialOverlay').remove()" style="background:var(--glass2,#f0f0f0);border:1px solid var(--border2);border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--sub)">বাতিল</button>
      <button onclick="confirmPartialPay('${id}')" style="background:linear-gradient(135deg,#16a34a,#15803d);border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#fff">✓ পরিশোধ করুন</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function confirmPartialPay(id){
  const amt=parseInt(document.getElementById('partialAmt')?.value)||0;
  const date=document.getElementById('partialDate')?.value||today();
  const t=txns.find(x=>x.id===id);if(!t)return;
  const remaining=t.amount-(t.paidAmount||0);
  if(amt<=0||amt>remaining){showToast('সঠিক পরিমাণ দিন','#dc2626');return;}
  // record payment
  const paid=(t.paidAmount||0)+amt;
  txns=txns.map(x=>x.id===id?{...x,paidAmount:paid,settled:paid>=x.amount}:x);
  // add payment record
  txns.unshift({id:uid(),type:'income',subtype:'nogod',amount:amt,costPrice:0,date,note:`আংশিক ${t.type==='receivable'?'আদায়':'পরিশোধ'} — ${t.party}`,party:t.party,phone:t.phone,dueDate:'',category:'',settled:true,paidAmount:0,linkedId:id});
  save();
  document.getElementById('partialOverlay')?.remove();
  renderContent();
  showToast(`${BDT(amt)} পরিশোধ সম্পন্ন ✓`);
}

function settleTxn(id){txns=txns.map(t=>t.id===id?{...t,settled:true,paidAmount:t.amount}:t);save();renderContent();showToast('সম্পন্ন ✓');}
function deleteTxn(id){if(!confirm('মুছে ফেলবেন?'))return;txns=txns.filter(t=>t.id!==id);save();updateTopbar();renderContent();showToast('মুছে ফেলা হয়েছে','#dc2626');}

// ─── TX CARD ──────────────────────────────────────────
function txCard(t){
  const info=TINFO[t.type];
  const canSettle=(t.type==='receivable'||t.type==='payable')&&!t.settled;
  const hasPhone=t.phone&&t.phone.length>6;
  const sl=t.subtype==='baki'?'(বাকি)':t.subtype==='nogod'?'(নগদ)':'';
  // fix #8: receivable=পাওনা আদায়, payable=দেনা পরিশোধ
  const sLabel=t.type==='receivable'?'✓ আদায়':'✓ পরিশোধ';
  const remaining=t.amount-(t.paidAmount||0);
  const profit=t.type==='income'&&t.costPrice>0?t.amount-t.costPrice:null;
  return`<div class="gc tx-item">
    <div class="tx-dot" style="background:${info.bg}">${info.icon}</div>
    <div class="tx-info">
      <div class="tx-name">${t.party||t.category||info.label}</div>
      <div class="tx-meta">${info.label} ${sl} · ${t.date}${t.note?' · '+t.note:''}</div>
      ${profit!==null?`<div style="font-size:10px;color:#16a34a;font-weight:600">মুনাফা: ${BDT(profit)}</div>`:''}
      ${t.type==='receivable'||t.type==='payable'?`<div style="font-size:10px;color:${t.settled?'#16a34a':'var(--sub)'}">
        ${t.paidAmount>0&&!t.settled?`আদায়: ${BDT(t.paidAmount)} · বাকি: ${BDT(remaining)}`:''}
      </div>`:''}
      <div class="act-row">
        ${canSettle?`<button class="a-btn ${t.type==='receivable'?'settle-btn':'adai-btn'}" onclick="settleTxn('${t.id}')">${sLabel}</button>`:''}
        ${canSettle?`<button class="a-btn" style="border-color:#7c3aed;color:#7c3aed;background:rgba(124,58,237,.08)" onclick="partialPay('${t.id}')">৳ আংশিক</button>`:''}
        ${canSettle&&hasPhone?`<button class="a-btn wa-btn" onclick="sendWA('${t.phone}','${t.party}',${remaining},'${t.dueDate||''}','${t.type}')">📱</button>`:''}
        ${canSettle&&hasPhone?`<button class="a-btn sms-btn" onclick="sendSMS('${t.phone}','${t.party}',${remaining},'${t.dueDate||''}','${t.type}')">💬</button>`:''}
        <button class="a-btn del-btn" onclick="deleteTxn('${t.id}')">✕</button>
      </div>
    </div>
    <div class="tx-right">
      <div class="tx-amt" style="color:${info.color}">${BDT(t.amount)}</div>
      ${t.type==='receivable'||t.type==='payable'?`<span class="chip" style="color:${t.settled?'#16a34a':'#ea580c'};background:${t.settled?'rgba(22,163,74,.12)':'rgba(234,88,12,.12)'}">${t.settled?(t.type==='receivable'?'আদায়':'পরিশোধ'):'বাকি'}</span>`:''}
    </div>
  </div>`;
}

// ─── LEDGER ──────────────────────────────────────────
function renderLedger(el){
  const parties={};
  txns.filter(t=>t.type==='receivable'||t.type==='payable').forEach(t=>{
    if(!t.party)return;
    if(!parties[t.party])parties[t.party]={name:t.party,phone:t.phone||'',rec:0,pay:0,entries:[],type:t.type};
    const p=parties[t.party];
    const rem=t.amount-(t.paidAmount||0);
    // fix #8: receivable = পাওনা (আমি পাব), payable = দেনা (আমি দেব)
    if(t.type==='receivable'&&!t.settled)p.rec+=rem;
    if(t.type==='payable'&&!t.settled)p.pay+=rem;
    p.entries.push(t);
  });
  let list=Object.values(parties);
  if(ledgerFilter==='receivable')list=list.filter(p=>p.entries.some(e=>e.type==='receivable'));
  else if(ledgerFilter==='payable')list=list.filter(p=>p.entries.some(e=>e.type==='payable'));
  list.sort((a,b)=>(b.rec+b.pay)-(a.rec+a.pay));

  el.innerHTML=`<div style="font-weight:800;font-size:16px;margin-bottom:10px;color:var(--text)">📒 পার্টি লেজার</div>
  <div class="filter-row">
    ${[['সবাই','all'],['🔵 পাওনাদার','receivable'],['🟠 দেনাদার','payable']].map(([l,v])=>`<button onclick="filterL('${v}')" class="fbtn${ledgerFilter===v?' active':''}">${l}</button>`).join('')}
  </div>
  ${!list.length?`<div class="empty"><div class="empty-icon">📒</div><div class="empty-text">কোনো পাওনাদার/দেনাদার নেই</div></div>`:
  list.map((p,pi)=>{
    // fix #8: receivable = পাওনা (+ হলে আমি পাব), payable = দেনা (- হলে আমি দেব)
    const nr=p.rec-p.pay;
    return`<div class="gc" style="margin-bottom:8px;overflow:hidden;border-radius:16px">
      <div style="padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="togLed(${pi})">
        <div>
          <div style="font-weight:800;font-size:14px;color:var(--text)">${p.name}</div>
          ${p.phone?`<div style="font-size:10px;color:var(--sub)">📱 ${p.phone}</div>`:''}
          <div style="font-size:10px;color:var(--sub)">${p.entries.length} টি লেনদেন</div>
        </div>
        <div style="text-align:right">
          ${p.rec>0?`<div style="color:#2563eb;font-size:11px;font-weight:700">পাওনা ${BDT(p.rec)}</div>`:''}
          ${p.pay>0?`<div style="color:#ea580c;font-size:11px;font-weight:700">দেনা ${BDT(p.pay)}</div>`:''}
          <div style="font-weight:900;font-size:13px;color:${nr>0?'#2563eb':nr<0?'#ea580c':'#16a34a'}">
            ${nr>0?'আমি পাব: '+BDT(nr):nr<0?'আমি দেব: '+BDT(-nr):'✓ পরিশোধিত'}
          </div>
        </div>
      </div>
      <div style="border-top:1px solid var(--border);padding:10px 14px;display:none" id="lb-${pi}">
        ${p.phone?`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px">
          <button class="wa-btn" style="padding:8px;font-size:11px;border-radius:8px;text-align:center" onclick="sendWA('${p.phone}','${p.name}',${Math.abs(nr)},'','${nr>0?'receivable':'payable'}')">📱 WA</button>
          <button class="sms-btn" style="padding:8px;font-size:11px;border-radius:8px;text-align:center" onclick="sendSMS('${p.phone}','${p.name}',${Math.abs(nr)},'','${nr>0?'receivable':'payable'}')">💬 SMS</button>
          ${nr<0?`<button onclick="openSupplierOrder('${p.name}','${p.phone}')" style="background:rgba(124,58,237,.12);color:#7c3aed;border:1px solid #7c3aed;border-radius:8px;padding:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">📦 অর্ডার</button>`:
          `<button onclick="partialPay('${p.entries.filter(e=>e.type==='receivable'&&!e.settled)[0]?.id||''}')" style="background:rgba(124,58,237,.12);color:#7c3aed;border:1px solid #7c3aed;border-radius:8px;padding:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">৳ আংশিক</button>`}
        </div>`:''}
        ${p.entries.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=>{
          const canS=!e.settled;
          const rem=e.amount-(e.paidAmount||0);
          // fix #8: receivable = আদায়, payable = পরিশোধ
          const sL=e.type==='receivable'?'✓ আদায়':'✓ পরিশোধ';
          return`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
            <div>
              <span class="chip" style="color:${TINFO[e.type].color};background:${TINFO[e.type].bg}">${TINFO[e.type].label}</span>
              <span style="font-size:10px;color:var(--sub);margin-left:5px">${e.date}${e.note?' · '+e.note:''}</span>
              ${e.paidAmount>0&&!e.settled?`<div style="font-size:10px;color:#7c3aed">আদায়: ${BDT(e.paidAmount)} · বাকি: ${BDT(rem)}</div>`:''}
            </div>
            <div style="text-align:right">
              <div style="font-weight:800;color:${TINFO[e.type].color};font-size:13px">${BDT(e.amount)}</div>
              <span class="chip" style="color:${e.settled?'#16a34a':'#ea580c'};background:${e.settled?'rgba(22,163,74,.12)':'rgba(234,88,12,.12)'}">${e.settled?(e.type==='receivable'?'আদায়':'পরিশোধ'):'বাকি'}</span>
              ${canS?`<br><div style="display:flex;gap:4px;margin-top:3px;justify-content:flex-end">
                <button class="${e.type==='receivable'?'settle-btn':'adai-btn'}" style="font-size:9px;padding:3px 7px" onclick="settleTxn('${e.id}');renderContent()">${sL}</button>
                <button style="background:rgba(124,58,237,.1);color:#7c3aed;border:1px solid #7c3aed;border-radius:6px;font-size:9px;padding:3px 7px;cursor:pointer;font-family:inherit" onclick="partialPay('${e.id}')">৳</button>
              </div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}`;
}
function togLed(i){const e=document.getElementById('lb-'+i);if(e)e.style.display=e.style.display==='block'?'none':'block';}
function filterL(f){ledgerFilter=f;renderContent();}

  <!-- সবাইকে একসাথে তাগাদা -->

    <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px">📢 সবাইকে একসাথে তাগাদা</div>

function tagadaAllWA(){
  const pending=txns.filter(t=>t.type==='receivable'&&!t.settled&&t.phone);
  const parties={};
  pending.forEach(t=>{
    if(!parties[t.party])parties[t.party]={name:t.party,phone:t.phone,amount:0,dueDate:t.dueDate||''};
    parties[t.party].amount+=t.amount-(t.paidAmount||0);
  });
  const list=Object.values(parties);
  if(!list.length){showToast('পাওনাদার নেই','#ea580c');return;}
  let i=0;
  function sendNext(){
    if(i>=list.length)return;
    const p=list[i++];
    sendWA(p.phone,p.name,p.amount,p.dueDate,'receivable');
    setTimeout(sendNext,1500);
  }
  showToast(`${list.length} জনকে WhatsApp পাঠানো হচ্ছে...`);
  sendNext();
}

  const pending=txns.filter(t=>t.type==='receivable'&&!t.settled&&t.phone);

    if(!parties[t.party])parties[t.party]={name:t.party,phone:t.phone,amount:0,dueDate:t.dueDate||''};

  });
  const list=Object.values(parties);
  if(!list.length){showToast('পাওনাদার নেই','#ea580c');return;}
  let i=0;
  function sendNext(){
    if(i>=list.length)return;
    const p=list[i++];
    sendSMS(p.phone,p.name,p.amount,p.dueDate,'receivable');

  }
  sendNext();
}

      <button onclick="document.getElementById('orderOverlay').remove()" style="background:var(--glass2,#f0f0f0);border:1px solid var(--border2);border-radius:12px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;color:var(--sub)">বাতিল</button>
      <button onclick="sendOrderWA('${name}','${phone}')" style="background:rgba(22,163,74,.1);border:1px solid #16a34a;border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:#16a34a;cursor:pointer;font-family:inherit">📱 WA</button>
      <button onclick="sendOrderSMS('${name}','${phone}')" style="background:rgba(37,99,235,.1);border:1px solid #2563eb;border-radius:12px;padding:12px;font-size:13px;font-weight:700;color:#2563eb;cursor:pointer;font-family:inherit">💬 SMS</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}

function sendOrderWA(name,phone){
  const items=document.getElementById('orderItems')?.value?.trim();
  const date=document.getElementById('orderDate')?.value;
  const note=document.getElementById('orderNote')?.value?.trim();
  if(!items){showToast('পণ্যের বিবরণ দিন','#dc2626');return;}
  const msg=`📦 *${shopName()}* — অর্ডার\n\nপ্রিয় *${name}*,\n\nনিচের পণ্যগুলো অর্ডার করছি:\n\n${items}${date?'\n\n📅 ডেলিভারি: *'+date+'*':''}${note?'\n\n📝 '+note:''}\n\nধন্যবাদ 🙏`;
  let num=phone.replace(/\D/g,'');if(num.startsWith('0'))num='880'+num.slice(1);if(!num.startsWith('880'))num='880'+num;
  document.getElementById('orderOverlay')?.remove();
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`,'_blank');
}
function sendOrderSMS(name,phone){
  const items=document.getElementById('orderItems')?.value?.trim();
  const date=document.getElementById('orderDate')?.value;
  if(!items){showToast('পণ্যের বিবরণ দিন','#dc2626');return;}
  const msg=`${shopName()} অর্ডার: ${items}.${date?' ডেলিভারি: '+date+'.':''} ধন্যবাদ।`;
  document.getElementById('orderOverlay')?.remove();
  window.open(`sms:${phone.replace(/\D/g,'')}?body=${encodeURIComponent(msg)}`,'_self');
}

// ─── REPORT ──────────────────────────────────────────
function getDateRange(period){
  const now=new Date();
  if(period==='daily'){return{label:'আজকের রিপোর্ট',start:today(),end:today()};}
  else if(period==='weekly'){const d=new Date(now);d.setDate(d.getDate()-6);return{label:'সাপ্তাহিক রিপোর্ট (গত ৭ দিন)',start:d.toISOString().split('T')[0],end:today()};}
  else{const[yr,mo]=curMonth().split('-');return{label:`মাসিক রিপোর্ট — ${MONTHS_S[parseInt(mo)-1]} ${yr}`,start:curMonth()+'-01',end:today()};}
}

function renderReport(el){
  const range=getDateRange(reportPeriod);
  const mt=txns.filter(t=>t.date>=range.start&&t.date<=range.end);
  const mNI=mt.filter(t=>t.type==='income'&&t.subtype==='nogod').reduce((a,b)=>a+b.amount,0);
  const mBI=mt.filter(t=>t.type==='income'&&t.subtype==='baki').reduce((a,b)=>a+b.amount,0);
  const mI=mNI+mBI;
  const mNE=mt.filter(t=>t.type==='expense'&&t.subtype==='nogod').reduce((a,b)=>a+b.amount,0);
  const mBE=mt.filter(t=>t.type==='expense'&&t.subtype==='baki').reduce((a,b)=>a+b.amount,0);
  const mE=mNE+mBE,mP=mI-mE,mNP=mNI-mNE,mBP=mBI-mBE,BAR=Math.max(mI,mE,1);
  // fix #4: profit based on cost price
  const realProfit=mt.filter(t=>t.type==='income'&&t.costPrice>0).reduce((a,b)=>a+(b.amount-b.costPrice),0);
  const byCat=arr=>arr.reduce((m,t)=>{const k=t.category||t.party||'অন্যান্য';m[k]=(m[k]||0)+t.amount;return m;},{});
  const ic=byCat(mt.filter(t=>t.type==='income')),ec=byCat(mt.filter(t=>t.type==='expense'));

  el.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div style="font-weight:800;font-size:16px;color:var(--text)">📊 রিপোর্ট</div>
    <select class="j-inp" style="width:auto;padding:6px 10px;font-size:12px" onchange="rMonth=this.value;renderContent()"></select>
  </div>
  <div class="filter-row" style="margin-bottom:12px">
    ${[['📅 আজকের','daily'],['📆 সাপ্তাহিক','weekly'],['🗓️ মাসিক','monthly']].map(([l,v])=>`<button onclick="reportPeriod='${v}';renderContent()" class="fbtn${reportPeriod===v?' active':''}">${l}</button>`).join('')}
  </div>
  <div class="gc" style="padding:12px;margin-bottom:0">
    <div style="padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:12px;font-weight:800;color:var(--sub);margin-bottom:3px">🏆 ${range.label}</div>
        <div style="font-size:24px;font-weight:900;color:${mP>=0?'#16a34a':'#dc2626'};letter-spacing:-.8px">${BDT(mP)}</div>
        ${realProfit>0?`<div style="font-size:11px;color:#7c3aed;font-weight:600;margin-top:3px">ক্রয়মূল্য ভিত্তিক মুনাফা: ${BDT(realProfit)}</div>`:''}
      </div>
      <div style="text-align:right;font-size:11px;color:var(--sub);line-height:2">আয়: <b style="color:#16a34a">${BDT(mI)}</b><br>ব্যয়: <b style="color:#dc2626">${BDT(mE)}</b></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      ${miniCard('linear-gradient(135deg,#d1fae5,#a7f3d0)','#065f46','#166534','💵 নগদ মুনাফা',BDT(mNP),'আয়',BDT(mNI),'ব্যয়',BDT(mNE))}
      ${miniCard('linear-gradient(135deg,#dbeafe,#bfdbfe)','#1e3a8a','#1d4ed8','📝 বাকি মুনাফা',BDT(mBP),'আয়',BDT(mBI),'ব্যয়',BDT(mBE))}
    </div>
  </div>
  ${divider('চার্ট')}
  <div class="gc" style="padding:13px;margin-bottom:9px">
    ${[{l:'মোট আয়',v:mI,c:'#16a34a'},{l:'মোট ব্যয়',v:mE,c:'#dc2626'},{l:'নিট মুনাফা',v:mP,c:mP>=0?'#16a34a':'#dc2626'}].map(b=>`
      <div style="margin-bottom:11px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span style="color:var(--sub)">${b.l}</span><span style="font-weight:800;color:${b.c}">${BDT(b.v)}</span>
        </div>
        <div class="bar-track"><div class="bar-fill" style="background:${b.c};width:${Math.min(100,Math.abs(b.v)/BAR*100)}%"></div></div>
      </div>`).join('')}
  </div>
  ${divider('বিভাগ অনুযায়ী')}
  <div class="gc" style="padding:13px;margin-bottom:8px">
    <div style="font-size:11px;font-weight:700;color:#16a34a;margin-bottom:8px">আয়ের বিভাগ</div>
    ${Object.keys(ic).length?Object.entries(ic).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--sub)">${k}</span><span style="font-weight:700;color:#16a34a">${BDT(v)}</span></div>`).join(''):'<div style="color:var(--sub);font-size:12px;padding:4px 0">কোনো আয় নেই</div>'}
  </div>
  <div class="gc" style="padding:13px">
    <div style="font-size:11px;font-weight:700;color:#dc2626;margin-bottom:8px">ব্যয়ের বিভাগ</div>
    ${Object.keys(ec).length?Object.entries(ec).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px"><span style="color:var(--sub)">${k}</span><span style="font-weight:700;color:#dc2626">${BDT(v)}</span></div>`).join(''):'<div style="color:var(--sub);font-size:12px;padding:4px 0">কোনো ব্যয় নেই</div>'}
  </div>`;
}

// ─── PIN SYSTEM (unchanged from v1.5) ────────────────
const PIN_KEY='dk_pin';
const SESSION_KEY='dk_unlocked';
let pinUnlocked=false;
function getPin(){return localStorage.getItem(PIN_KEY)||'';}
function isSessionUnlocked(){return sessionStorage.getItem(SESSION_KEY)==='1';}
function setSessionUnlocked(){sessionStorage.setItem(SESSION_KEY,'1');pinUnlocked=true;}
function showPinScreen(mode){
  const overlay=document.createElement('div');
  overlay.id='pinOverlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px';
  const titles={unlock:`<div style="font-size:32px;margin-bottom:8px">🔐</div><div style="font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px">${shopName()}</div><div style="font-size:13px;color:var(--sub);margin-bottom:28px">PIN দিন</div>`,setup:`<div style="font-size:32px;margin-bottom:8px">🔒</div><div style="font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px">নতুন PIN সেট করুন</div><div style="font-size:13px;color:var(--sub);margin-bottom:28px">৪ সংখ্যার PIN বেছে নিন</div>`,change:`<div style="font-size:32px;margin-bottom:8px">🔑</div><div style="font-size:20px;font-weight:900;color:var(--text);margin-bottom:6px">পুরনো PIN দিন</div><div style="font-size:13px;color:var(--sub);margin-bottom:28px">যাচাই করতে পুরনো PIN লিখুন</div>`};
  overlay.innerHTML=`<div style="width:100%;max-width:320px">${titles[mode]}<div id="pinDots" style="display:flex;justify-content:center;gap:16px;margin-bottom:32px">${[0,1,2,3].map(i=>`<div id="dot${i}" style="width:16px;height:16px;border-radius:50%;background:var(--border2);border:2px solid var(--border2);transition:all .2s"></div>`).join('')}</div><div id="pinError" style="text-align:center;color:#dc2626;font-size:13px;font-weight:600;margin-bottom:16px;min-height:20px"></div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(n=>n===''?`<div></div>`:`<button onclick="pinPress('${n}')" style="background:var(--glass);backdrop-filter:var(--blur);border:1px solid var(--border2);border-radius:16px;padding:18px 8px;font-size:22px;font-weight:700;color:var(--text);cursor:pointer;font-family:inherit;box-shadow:var(--shadow)">${n}</button>`).join('')}</div>${mode==='unlock'?`<div style="text-align:center;margin-top:8px"><button onclick="forgotPin()" style="background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;font-family:inherit;text-decoration:underline">PIN ভুলে গেছেন?</button></div>`:''} ${mode!=='unlock'?`<button onclick="cancelPinSetup()" style="width:100%;background:none;border:1px solid var(--border2);border-radius:12px;padding:12px;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px">বাতিল</button>`:''}</div>`;
  document.body.appendChild(overlay);
}
let pinInput='',pinSetupStep=1,pinSetupFirst='',pinChangeStep=1,pinChangeNew='',currentPinMode='unlock';
function pinPress(val){if(val==='⌫'){pinInput=pinInput.slice(0,-1);}else{if(pinInput.length>=4)return;pinInput+=val;}updatePinDots();if(pinInput.length===4)setTimeout(()=>processPinInput(),150);}
function updatePinDots(){for(let i=0;i<4;i++){const dot=document.getElementById('dot'+i);if(dot){if(i<pinInput.length){dot.style.background='#16a34a';dot.style.borderColor='#16a34a';dot.style.transform='scale(1.2)';}else{dot.style.background='var(--border2)';dot.style.borderColor='var(--border2)';dot.style.transform='scale(1)';}}}  }
function showPinError(msg){const el=document.getElementById('pinError');if(el)el.textContent=msg;const dots=document.getElementById('pinDots');if(dots){dots.style.animation='shake .3s';setTimeout(()=>dots.style.animation='',400);}pinInput='';updatePinDots();}
function processPinInput(){
  const errEl=document.getElementById('pinError');if(errEl)errEl.textContent='';
  if(currentPinMode==='unlock'){if(pinInput===getPin()){setSessionUnlocked();document.getElementById('pinOverlay')?.remove();renderContent();}else{showPinError('ভুল PIN! আবার চেষ্টা করুন।');}}
  else if(currentPinMode==='setup'){if(pinSetupStep===1){pinSetupFirst=pinInput;pinSetupStep=2;pinInput='';updatePinDots();const subEl=document.getElementById('pinOverlay')?.querySelectorAll('div > div')[2];if(subEl)subEl.textContent='PIN আবার দিন নিশ্চিত করতে';}else{if(pinInput===pinSetupFirst){localStorage.setItem(PIN_KEY,pinInput);setSessionUnlocked();document.getElementById('pinOverlay')?.remove();showToast('PIN সেট হয়েছে ✓');openDetail('settings');}else{pinSetupStep=1;pinSetupFirst='';showPinError('PIN মিলছে না!');}}}
  else if(currentPinMode==='change'){if(pinChangeStep===1){if(pinInput===getPin()){pinChangeStep=2;pinInput='';updatePinDots();}else{showPinError('ভুল PIN!');}}else if(pinChangeStep===2){pinChangeNew=pinInput;pinChangeStep=3;pinInput='';updatePinDots();}else{if(pinInput===pinChangeNew){localStorage.setItem(PIN_KEY,pinInput);document.getElementById('pinOverlay')?.remove();showToast('PIN পরিবর্তন হয়েছে ✓');openDetail('settings');}else{pinChangeStep=2;pinChangeNew='';showPinError('PIN মিলছে না!');}}}
  pinInput='';
}
function forgotPin(){if(confirm('PIN ভুলে গেলে সব data মুছে যাবে। নিশ্চিত?')){localStorage.clear();sessionStorage.clear();location.reload();}}
function cancelPinSetup(){document.getElementById('pinOverlay')?.remove();pinInput='';pinSetupStep=1;pinSetupFirst='';pinChangeStep=1;pinChangeNew='';}
function setupPin(){closeDetail();pinInput='';pinSetupStep=1;pinSetupFirst='';currentPinMode='setup';showPinScreen('setup');}
function changePin(){closeDetail();pinInput='';pinChangeStep=1;pinChangeNew='';currentPinMode='change';showPinScreen('change');}
function removePin(){if(confirm('PIN সরিয়ে দেবেন?')){localStorage.removeItem(PIN_KEY);showToast('PIN সরানো হয়েছে');openDetail('settings');}}
const pinStyle=document.createElement('style');
pinStyle.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}';
document.head.appendChild(pinStyle);
function checkPinOnLoad(){if(getPin()&&!isSessionUnlocked()){pinInput='';currentPinMode='unlock';showPinScreen('unlock');}else{pinUnlocked=true;}}

// ─── INIT ─────────────────────────────────────────────
updateTopbar();
renderContent();
checkPinOnLoad();
history.replaceState({tab:'home'},'','');
</script></body></html>
