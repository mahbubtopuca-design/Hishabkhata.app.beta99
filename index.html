<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#f0f4ff"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="দোকানখাতা"/>
<title>দোকানখাতা — ডিজিটাল হিসাব খাতা</title>
<style>
/* ════════════════════════════════════════════════
   DOKAN PRO — GLOBAL STYLES (One-File Edition)
   ════════════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg:#eef2ff;
  --glass:rgba(255,255,255,0.68);
  --glass2:rgba(255,255,255,0.45);
  --glass3:rgba(255,255,255,0.88);
  --border:rgba(99,102,241,0.12);
  --border2:rgba(99,102,241,0.22);
  --text:#1e1b4b;--sub:#6b7280;--sub2:#9ca3af;
  --blur:blur(18px);--blur2:blur(28px);
  --shadow:0 4px 20px rgba(99,102,241,0.10);
  --shadow2:0 8px 36px rgba(99,102,241,0.16);
  --radius:16px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif}

body::before{content:'';position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#e0e7ff 0%,#fce7f3 28%,#ecfdf5 60%,#fefce8 100%)}

.blob-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.blob{position:absolute;border-radius:50%;filter:blur(55px);animation:bF 9s ease-in-out infinite}
.b1{width:280px;height:280px;background:rgba(139,92,246,.18);top:-90px;left:-70px;animation-delay:0s}
.b2{width:240px;height:240px;background:rgba(236,72,153,.15);top:30%;right:-70px;animation-delay:2.5s}
.b3{width:210px;height:210px;background:rgba(6,182,212,.15);bottom:28%;left:-50px;animation-delay:5s}
.b4{width:190px;height:190px;background:rgba(16,185,129,.15);bottom:-55px;right:18%;animation-delay:7s}
@keyframes bF{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-16px) scale(1.04)}}

#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;height:100dvh}

#topbar{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);
  border-bottom:1px solid var(--border2);padding:11px 16px;
  padding-top:max(11px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 12px rgba(99,102,241,0.08)}
.shop-name{font-weight:900;font-size:16px;color:var(--text)}
.shop-badge{background:linear-gradient(135deg,#16a34a,#15803d);border-radius:8px;padding:2px 8px;font-size:10px;font-weight:700;color:#fff;margin-left:6px}
.icon-btn{background:var(--glass2);backdrop-filter:var(--blur);border:1px solid var(--border2);color:var(--sub);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

#content{flex:1;overflow-y:auto;padding:12px 13px;padding-bottom:85px;-webkit-overflow-scrolling:touch}
#content::-webkit-scrollbar{display:none}

#bottomnav{position:fixed;bottom:0;left:0;right:0;
  background:var(--glass3);backdrop-filter:var(--blur2);-webkit-backdrop-filter:var(--blur2);
  border-top:1px solid var(--border2);display:flex;align-items:center;z-index:100;
  padding-bottom:max(8px,env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(99,102,241,0.08)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;border:none;background:transparent;cursor:pointer;font-family:inherit;gap:2px}
.bnav-icon{font-size:18px;line-height:1;transition:transform .15s}
.bnav-label{font-size:9px;font-weight:600;color:var(--sub2);transition:color .15s}
.bnav-btn.active .bnav-label{color:#16a34a}
.bnav-btn.active .bnav-icon{transform:scale(1.18)}
.bnav-center{flex:0 0 66px;display:flex;justify-content:center;align-items:center}
.add-fab{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#15803d);
  border:3px solid rgba(255,255,255,.75);cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(22,163,74,0.38);font-size:26px;color:#fff;transition:transform .15s}

/* OVERLAYS */
#journeyOverlay, #detailOverlay{position:fixed;inset:0;background:rgba(30,27,75,.4);z-index:3000;display:none;align-items:flex-end;backdrop-filter:blur(8px)}
#journeyOverlay.open, #detailOverlay.open{display:flex}
#journeySheet, #detailSheet{background:var(--glass3);backdrop-filter:blur(28px);border-radius:26px 26px 0 0;width:100%;max-height:92vh;display:flex;flex-direction:column;padding-bottom:max(20px,env(safe-area-inset-bottom));border-top:1px solid var(--border2);transform:translateY(100%);transition:transform .35s}
#journeyOverlay.open #journeySheet, #detailOverlay.open #detailSheet{transform:translateY(0)}

/* FORMS & BUTTONS */
.j-field{margin-bottom:12px}
.j-field label{display:block;font-size:10px;font-weight:700;color:var(--sub);margin-bottom:5px;text-transform:uppercase}
.j-inp{width:100%;background:var(--glass2);color:var(--text);border:1.5px solid var(--border2);border-radius:10px;padding:12px;font-size:15px;outline:none;font-family:inherit}
.j-btn, .j-next{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;width:100%;box-shadow:0 4px 14px rgba(22,163,74,.25)}

/* TOAST */
#toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
</style>
</head>
<body>

<div class="blob-bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div><div class="blob b4"></div></div>

<div id="app">
  <div id="topbar">
    <div style="display:flex;align-items:center"><div class="shop-name" id="shopNameDisplay">📒 দোকানখাতা</div><span class="shop-badge">লাইভ</span></div>
    <div style="display:flex;gap:7px;align-items:center"><div style="font-size:10px;color:var(--sub);text-align:right" id="topDate"></div><button class="icon-btn" onclick="openSettings()">⚙️</button></div>
  </div>

  <div id="content"></div>

  <div id="bottomnav">
    <button class="bnav-btn active" onclick="goTab('home')"><span class="bnav-icon">🏠</span><span class="bnav-label">হোম</span></button>
    <button class="bnav-btn" onclick="goTab('history')"><span class="bnav-icon">📋</span><span class="bnav-label">ইতিহাস</span></button>
    <div class="bnav-center"><button class="add-fab" onclick="startJourney()">＋</button></div>
    <button class="bnav-btn" onclick="goTab('ledger')"><span class="bnav-icon">📒</span><span class="bnav-label">লেজার</span></button>
    <button class="bnav-btn" onclick="goTab('report')"><span class="bnav-icon">📊</span><span class="bnav-label">রিপোর্ট</span></button>
  </div>
</div>

<div id="journeyOverlay" onclick="if(event.target===this)closeJourney()"><div id="journeySheet"><div class="j-handle"></div><div class="j-head"><span class="j-step" id="jStep"></span></div><div class="j-body" id="jBody"></div></div></div>

<div id="toast"></div>

<script>
/* ════════════════════════════════════════════════
   DOKAN PRO — LOGIC (Core v1.6)
   ════════════════════════════════════════════════ */
const LS = k => { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; } };
const SS = (k, v) => localStorage.setItem(k, JSON.stringify(v));
let txns = LS('dk_txns');

const BDT = n => '৳' + Number(n || 0).toLocaleString('en-BD');
const today = () => new Date().toISOString().split('T')[0];

const TINFO = {
  income: { icon: '💚', color: '#16a34a', label: 'আয়' },
  expense: { icon: '🔴', color: '#dc2626', label: 'ব্যয়' },
  receivable: { icon: '🔵', color: '#2563eb', label: 'পাওনা' },
  payable: { icon: '🟠', color: '#ea580c', label: 'দেনা' },
};

let currentTab = 'home';
function goTab(t) {
  currentTab = t;
  document.querySelectorAll('.bnav-btn').forEach((b, i) => {
    b.classList.toggle('active', ['home', 'history', '', 'ledger', 'report'][i] === t);
  });
  renderContent();
}

function renderContent() {
  const c = document.getElementById('content');
  if (currentTab === 'home') {
    c.innerHTML = `<div class="net-hero"><div class="nh-label">মোট লাভ (Net Profit)</div><div class="nh-val">${BDT(calculateProfit())}</div></div>`;
  } else {
    c.innerHTML = `<div class="empty">শীঘ্রই আসছে...</div>`;
  }
}

function calculateProfit() {
  return txns.reduce((acc, t) => t.type === 'income' ? acc + t.amount : t.type === 'expense' ? acc - t.amount : acc, 0);
}

// JOURNEY LOGIC
let J = {};
function startJourney() {
  J = { step: 0, amount: 0, type: '', subtype: '', party: '', date: today() };
  document.getElementById('journeyOverlay').classList.add('open');
  jRender(0);
}

function closeJourney() { document.getElementById('journeyOverlay').classList.remove('open'); }

function jRender(step) {
  J.step = step;
  const body = document.getElementById('jBody');
  if (step === 0) {
    body.innerHTML = `<div class="j-q">কত টাকা?</div><input type="number" class="j-inp" id="jAmt" placeholder="0.00"><button class="j-next" onclick="J.amount=Number(document.getElementById('jAmt').value);jRender(1)">পরবর্তী</button>`;
  } else if (step === 1) {
    body.innerHTML = `<div class="j-q">লেনদেনের ধরন?</div>
      <button class="j-btn" onclick="J.type='income';jRender(3)">আয় (Income)</button><br><br>
      <button class="j-btn" style="background:red" onclick="J.type='expense';jRender(3)">ব্যয় (Expense)</button>`;
  } else if (step === 3) {
    // Professional Accounting Terminology Logic
    let nameLabel = J.type === 'income' ? "ক্রেতা/দেনাদারের নাম (Customer)" : "বিক্রেতা/পাওনাদারের নাম (Supplier)";
    body.innerHTML = `<div class="j-q">বিস্তারিত তথ্য</div>
      <div class="j-field"><label>${nameLabel}</label><input class="j-inp" id="jParty"></div>
      <div class="j-field"><label>তারিখ</label><input type="date" class="j-inp" id="jDate" value="${J.date}"></div>
      <button class="j-btn" onclick="saveFinal()">সংরক্ষণ করুন</button>`;
  }
}

function saveFinal() {
  J.party = document.getElementById('jParty').value;
  J.date = document.getElementById('jDate').value;
  txns.push({...J, id: Date.now()});
  SS('dk_txns', txns);
  closeJourney();
  goTab('home');
}

// Init
renderContent();
</script>
</body>
</html>
