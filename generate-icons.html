<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.12;
  // Background
  ctx.fillStyle = '#0d1117';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();
  // Green circle accent
  ctx.fillStyle = '#58a6ff';
  ctx.beginPath();
  ctx.arc(size*0.5, size*0.38, size*0.22, 0, Math.PI*2);
  ctx.fill();
  // Cart emoji text
  ctx.font = `${size*0.32}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🛒', size*0.5, size*0.38);
  // Text
  ctx.fillStyle = '#e6edf3';
  ctx.font = `bold ${size*0.13}px 'Segoe UI', sans-serif`;
  ctx.fillText('Dokan', size*0.5, size*0.68);
  ctx.fillStyle = '#58a6ff';
  ctx.font = `bold ${size*0.09}px 'Segoe UI', sans-serif`;
  ctx.fillText('PRO', size*0.5, size*0.82);
}

window.onload = () => {
  const c192 = document.getElementById('c192');
  const c512 = document.getElementById('c512');
  drawIcon(c192, 192);
  drawIcon(c512, 512);

  // Download both
  [c192, c512].forEach((c, i) => {
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = i === 0 ? 'icon-192.png' : 'icon-512.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
  document.body.innerHTML = '<h2 style="font-family:sans-serif;padding:20px">✅ Icons downloaded! (icon-192.png & icon-512.png)</h2>';
};
</script>
</body>
</html>
