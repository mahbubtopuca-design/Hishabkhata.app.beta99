<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0f0f1a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Dokan Pro"/>
<link rel="manifest" href="manifest.json"/>
<title>Dokan Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg:#0f0f1a;--card:#1a1a2e;--card2:#16213e;--border:#2a2a4a;
  --text:#ffffff;--sub:#8888aa;
  --green:#00d48a;--red:#ff4757;--orange:#ffa502;
  --blue:#4fc3f7;--purple:#b388ff;
  --green-bg:#002a1a;--red-bg:#2a0a0a;--orange-bg:#2a1800;--blue-bg:#0a1a2a;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;user-select:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TOPBAR */
#topbar{background:var(--card);border-bottom:1px solid var(--border);
  padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.shop-name{font-weight:900;font-size:16px}
.top-net{font-size:11px;color:var(--sub);margin-top:2px}
.top-net b{font-weight:800}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:14px;padding-bottom:100px;-webkit-overflow-scrolling:touch}

/* BOTTOM NAV */
#bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--border);display:flex;align-items:center;z-index:100;
  padding-bottom:max(10px,env(safe-area-inset-bottom))}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:8px 2px;border:none;background:transparent;
  cursor:pointer;font-family:inherit;gap:3px}
.bnav-icon{font-size:19px;line-height:1;transition:transform .15s}
.bnav-label{font-size:9px;font-weight:600;color:var(--sub);transition:color .15s}
.bnav-btn.active .bnav-label{color:var(--green)}
.bnav-btn.active .bnav-icon{transform:scale(1.2)}
.bnav-center{flex:0 0 70px;display:flex;justify-content:center;align-items:center}
.add-fab{width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--green),#00a86b);
  border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(0,212,138,.45);font-size:30px;color:#fff;line-height:1;
  transition:transform .15s,box-shadow .15s}
.add-fab:active{transform:scale(.9);box-shadow:0 2px 8px rgba(0,212,138,.3)}

/* CARDS */
.net-banner{background:linear-gradient(135deg,#002a1a,#001510);
  border:1px solid rgba(0,212,138,.3);border-radius:16px;padding:18px;
  margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.net-val{font-size:30px;font-weight:900;letter-spacing:-1px}
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px;cursor:pointer;transition:transform .1s}
.sum-card:active{transform:scale(.97)}
.sum-icon{font-size:20px;margin-bottom:6px}
.sum-label{font-size:10px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sum-val{font-size:20px;font-weight:900;margin-top:4px;letter-spacing:-.5px}
.sum-sub{font-size:10px;color:var(--sub);margin-top:3px}
.sec-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:10px}

/* TX ITEM */
.tx-item{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.tx-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:16px;flex-shrink:0;margin-top:2px}
.tx-info{flex:1;min-width:0}
.tx-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--sub);margin-top:2px}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.tx-amt{font-weight:900;font-size:15px;white-space:nowrap}
.chip{display:inline-block;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700}
.act-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.a-btn{border-radius:7px;padding:5px 9px;font-size:10px;font-weight:700;cursor:pointer;border:1px solid;font-family:inherit}

/* JOURNEY */
#journeyOverlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:3000;
  display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
#journeyOverlay.open{display:flex}
#journeySheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;
  max-height:90vh;display:flex;flex-direction:column;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .35s cubic-bezier(.25,.46,.45,.94)}
#journeyOverlay.open #journeySheet{transform:translateY(0)}
.j-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0}
.j-head{padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between}
.j-step{font-size:11px;color:var(--sub);font-weight:600}
.j-body{padding:18px;overflow-y:auto;flex:1}
.j-q{font-size:22px;font-weight:900;margin-bottom:5px;line-height:1.3}
.j-hint{font-size:13px;color:var(--sub);margin-bottom:20px}

/* NUMPAD */
.num-display{background:var(--card2);border:2px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:16px;text-align:center}
.num-amount{font-size:42px;font-weight:900;color:var(--green);letter-spacing:-2px;line-height:1}
.num-sub{font-size:12px;color:var(--sub);margin-top:4px}
.num-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.num-btn{background:var(--card2);border:1px solid var(--border);border-radius:12px;
  padding:17px 8px;font-size:22px;font-weight:700;color:var(--text);cursor:pointer;
  font-family:inherit;transition:all .1s;text-align:center}
.num-btn:active{background:var(--border);transform:scale(.93)}
.num-btn.del{font-size:17px;color:var(--sub)}
.j-next{background:linear-gradient(135deg,var(--green),#00a86b);color:#fff;
  border:none;border-radius:14px;padding:15px;font-size:17px;font-weight:800;
  cursor:pointer;width:100%;font-family:inherit}
.j-next:active{opacity:.8}
.j-next:disabled{background:var(--border);color:var(--sub)}

/* TYPE CARDS */
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.type-card{background:var(--card2);border:2px solid var(--border);border-radius:16px;
  padding:18px 12px;text-align:center;cursor:pointer;font-family:inherit;transition:all .15s}
.type-card:active{transform:scale(.95)}
.type-card.sel{border-width:2px}
.t-icon{font-size:30px;margin-bottom:7px}
.t-name{font-size:15px;font-weight:800;margin-bottom:3px}
.t-desc{font-size:11px;color:var(--sub);line-height:1.4}

/* FORM */
.j-field{margin-bottom:12px}
.j-field label{display:block;font-size:10px;font-weight:700;color:var(--sub);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.j-inp{width:100%;background:var(--card2);color:var(--text);border:1.5px solid var(--border);
  border-radius:10px;padding:12px;font-size:15px;outline:none;font-family:inherit;transition:border .15s}
.j-inp:focus{border-color:var(--green)}
.j-btn{background:linear-gradient(135deg,var(--green),#00a86b);color:#fff;border:none;
  border-radius:14px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;
  width:100%;font-family:inherit}
.j-btn:active{opacity:.8}

/* SUCCESS */
.suc-wrap{text-align:center;padding:10px 0 4px}
.suc-icon{font-size:64px;margin-bottom:14px;animation:pop .4s ease}
@keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.15)}100%{transform:scale(1)}}
.suc-title{font-size:22px;font-weight:900;margin-bottom:6px}
.suc-sub{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.suc-summary{background:var(--card2);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left}
.suc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.suc-row:last-child{border-bottom:none;font-weight:800;font-size:15px;padding-top:10px}
.suc-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.s-btn{border:none;border-radius:12px;padding:14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}

/* DETAIL */
#detailOverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;
  display:none;align-items:flex-end;backdrop-filter:blur(3px)}
#detailOverlay.open{display:flex}
#detailSheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;
  max-height:88vh;display:flex;flex-direction:column;
  padding-bottom:max(20px,env(safe-area-inset-bottom));
  transform:translateY(100%);transition:transform .3s ease}
#detailOverlay.open #detailSheet{transform:translateY(0)}
.d-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 8px}
.d-head{padding:8px 18px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.d-title{font-size:16px;font-weight:800}
.d-close{background:var(--card2);border:1px solid var(--border);color:var(--sub);
  width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px;font-family:inherit}
.d-body{padding:16px;overflow-y:auto;flex:1}

/* LEDGER */
.led-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.led-head{padding:14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.led-head:active{background:var(--card2)}
.led-body{border-top:1px solid var(--border);padding:12px;display:none}

/* BARS */
.bar-track{background:var(--card2);border-radius:999px;height:8px;overflow:hidden;margin-top:5px}
.bar-fill{height:100%;border-radius:999px;transition:width .6s ease}

/* NOTIF */
.wa-btn{background:#1a2e00;color:#25d366;border:1px solid #25d366;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.sms-btn{background:#001a2e;color:#4fc3f7;border:1px solid #4fc3f7;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.settle-btn{background:#002a1a;color:#00d48a;border:1px solid #00d48a;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.del-btn{background:#2a0a0a;color:#ff4757;border:1px solid #ff4757;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* INSTALL BANNER */
#installBanner{display:none;position:fixed;top:0;left:0;right:0;z-index:9999;
  background:linear-gradient(135deg,#1a2744,#0d1f3c);
  border-bottom:1px solid var(--blue);padding:10px 14px;
  flex-direction:row;align-items:center;gap:10px}
.ib-text{flex:1;font-size:12px;color:var(--sub)}
.ib-text b{color:var(--blue);font-size:13px;display:block}
.ib-btn{border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;
  z-index:9999;opacity:0;transition:opacity .3s;white-space:nowrap;pointer-events:none}

.empty{text-align:center;padding:36px 0;color:var(--sub)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.7}
</style>
</head>
<body>

<div id="installBanner">
  <span style="font-size:22px">🛒</span>
  <div class="ib-text"><b>Dokan Pro ইন্সটল করুন</b>হোম স্ক্রিনে অ্যাপ হিসেবে ব্যবহার করুন</div>
  <button class="ib-btn" style="background:var(--blue);color:#fff;margin-right:5px" onclick="installApp()">ইন্সটল</button>
  <button class="ib-btn" style="background:var(--card2);color:var(--sub)" onclick="dismissInstall()">✕</button>
</div>

<div id="app">
  <div id="topbar">
    <div>
      <div class="shop-name" id="shopNameDisplay">🛒 আমার দোকান</div>
      <div class="top-net" id="topNet"></div>
    </div>
    <button onclick="openDetail('settings')" style="background:var(--card2);border:1px solid var(--border);color:var(--sub);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;font-family:inherit">⚙️</button>
  </div>
  <div id="content"></div>
  <div id="bottomnav">
    <button class="bnav-btn active" id="bn-home" onclick="goTab('home')">
      <span class="bnav-icon">🏠</span><span class="bnav-label">হোম</span>
    </button>
    <button class="bnav-btn" id="bn-history" onclick="goTab('history')">
      <span class="bnav-icon">📋</span><span class="bnav-label">ইতিহাস</span>
    </button>
    <div class="bnav-center"><button class="add-fab" onclick="startJourney()">＋</button></div>
    <button class="bnav-btn" id="bn-ledger" onclick="goTab('ledger')">
      <span class="bnav-icon">📒</span><span class="bnav-label">লেজার</span>
    </button>
    <button class="bnav-btn" id="bn-report" onclick="goTab('report')">
      <span class="bnav-icon">📊</span><span class="bnav-label">রিপোর্ট</span>
    </button>
  </div>
</div>

<!-- JOURNEY -->
<div id="journeyOverlay" onclick="if(event.target===this)closeJourney()">
  <div id="journeySheet">
    <div class="j-handle"></div>
    <div class="j-head">
      <button onclick="journeyBack()" style="background:var(--card2);border:1px solid var(--border);color:var(--sub);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:15px;font-family:inherit">←</button>
      <span class="j-step" id="jStep">ধাপ ১ / ৩</span>
      <button onclick="closeJourney()" style="background:var(--card2);border:1px solid var(--border);color:var(--sub);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;font-family:inherit">✕</button>
    </div>
    <div class="j-body" id="jBody"></div>
  </div>
</div>

<!-- DETAIL -->
<div id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div id="detailSheet">
    <div class="d-handle"></div>
    <div class="d-head">
      <span class="d-title" id="detailTitle"></span>
      <button class="d-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="d-body" id="detailBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// DATA
const LS=k=>{try{return JSON.parse(localStorage.getItem(k))||[];}catch{return[];}};
const SS=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
let txns=LS('dk_txns');
let inventory=LS('dk_inventory');

// migrate old separate arrays
(()=>{
  const maps={income:'income',expense:'expense',receivable:'receivable',payable:'payable'};
  let changed=false;
  Object.entries(maps).forEach(([key,type])=>{
    LS('dk_'+key).forEach(r=>{
      if(!txns.find(t=>t.id===r.id)){txns.push({...r,type});changed=true;}
    });
  });
  if(changed) SS('dk_txns',txns);
})();

const uid=()=>Date.now()+Math.random().toString(36).slice(2,6);
const BDT=n=>'৳'+Number(n||0).toLocaleString('en-BD',{minimumFractionDigits:0,maximumFractionDigits:0});
const BDT2=n=>'৳'+Number(n||0).toLocaleString('en-BD',{minimumFractionDigits:2,maximumFractionDigits:2});
const today=()=>new Date().toISOString().split('T')[0];
const monthOf=d=>(d||'').slice(0,7);
const MONTHS=['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টে','অক্টো','নভে','ডিসে'];
const shopName=()=>localStorage.getItem('dk_shop')||'আমার দোকান';
const TINFO={
  income:  {icon:'💚',color:'var(--green)',bg:'var(--green-bg)',label:'আয়',   desc:'বিক্রয় বা অন্য আয়'},
  expense: {icon:'🔴',color:'var(--red)',  bg:'var(--red-bg)',  label:'ব্যয়',  desc:'কেনাকাটা বা খরচ'},
  receivable:{icon:'🔵',color:'var(--blue)',bg:'var(--blue-bg)',label:'পাওনা', desc:'বাকিতে দিয়েছি'},
  payable: {icon:'🟠',color:'var(--orange)',bg:'var(--orange-bg)',label:'দেনা',desc:'বাকিতে নিয়েছি'},
};
function save(){SS('dk_txns',txns);}

// PWA
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  if(!localStorage.getItem('installDismissed'))
    document.getElementById('installBanner').style.display='flex';
});
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('installBanner').style.display='none';});}}
function dismissInstall(){document.getElementById('installBanner').style.display='none';localStorage.setItem('installDismissed','1');}
if('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

// TOPBAR
function updateTopbar(){
  document.getElementById('shopNameDisplay').textContent='🛒 '+shopName();
  const inc=txns.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
  const exp=txns.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);
  const net=inc-exp;
  document.getElementById('topNet').innerHTML=`নিট মুনাফা: <b style="color:${net>=0?'var(--green)':'var(--red)'}">${BDT(net)}</b>`;
}

// TOAST
function showToast(msg,bg='var(--green)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=bg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2200);
}

// TABS
let currentTab='home',currentFilter='all';
function goTab(t){
  currentTab=t;
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('bn-'+t);if(b)b.classList.add('active');
  renderContent();
}

// JOURNEY
let J={step:0,amount:0,type:'',party:'',phone:'',note:'',date:'',dueDate:'',category:''};
let numStr='';

function startJourney(){
  J={step:0,amount:0,type:'',party:'',phone:'',note:'',date:today(),dueDate:'',category:''};
  numStr='';
  document.getElementById('journeyOverlay').classList.add('open');
  jRender(0);
}
function closeJourney(){document.getElementById('journeyOverlay').classList.remove('open');}
function journeyBack(){if(J.step===0){closeJourney();return;}jRender(J.step-1);}

function jRender(step){
  J.step=step;
  const body=document.getElementById('jBody');
  const stepEl=document.getElementById('jStep');

  if(step===0){
    stepEl.textContent='ধাপ ১ / ৩';
    body.innerHTML=`
      <div class="j-q">কত টাকার লেনদেন?</div>
      <div class="j-hint">নিচের বাটন দিয়ে টাকার পরিমাণ লিখুন</div>
      <div class="num-display">
        <div class="num-amount" id="numDisp">${J.amount>0?BDT(J.amount):'০'}</div>
        <div class="num-sub">বাংলাদেশি টাকা (৳)</div>
      </div>
      <div class="num-grid">
        ${[7,8,9,4,5,6,1,2,3].map(n=>`<button class="num-btn" onclick="nPress('${n}')">${n}</button>`).join('')}
        <button class="num-btn" onclick="nPress('00')">00</button>
        <button class="num-btn" onclick="nPress('0')">0</button>
        <button class="num-btn del" onclick="nDel()">⌫</button>
      </div>
      <button class="j-next" id="jNext" onclick="jRender(1)" ${J.amount===0?'disabled':''}>পরবর্তী →</button>`;
  }
  else if(step===1){
    stepEl.textContent='ধাপ ২ / ৩';
    body.innerHTML=`
      <div class="j-q">${BDT(J.amount)} টাকা কীসের?</div>
      <div class="j-hint">নিচে থেকে বেছে নিন — অ্যাপ বাকিটা করবে</div>
      <div class="type-grid">
        ${Object.entries(TINFO).map(([k,v])=>`

      note:J.note,party:J.party,phone:J.phone,dueDate:J.dueDate,

          <div class="suc-row"><span style="color:var(--sub)">তারিখ</span><span>${J.date}</span></div>
        </div>
        ${hasNotif?`
          <div style="margin-bottom:16px">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
              <button class="wa-btn" style="padding:12px;font-size:13px;border-radius:10px" onclick="sendWA('${J.phone}','${J.party}',${J.amount},'${J.dueDate}','${J.type}')">📱 WhatsApp</button>
              <button class="sms-btn" style="padding:12px;font-size:13px;border-radius:10px" onclick="sendSMS('${J.phone}','${J.party}',${J.amount},'${J.dueDate}','${J.type}')">💬 SMS</button>

          <button class="s-btn" style="background:var(--card2);color:var(--sub)" onclick="closeJourney();renderContent()">✓ শেষ</button>

function nPress(v){
  if(!numStr&&v==='00')return;
  numStr+=v;if(numStr.length>10)numStr=numStr.slice(0,-1);
  J.amount=parseInt(numStr)||0;
  const d=document.getElementById('numDisp');if(d)d.textContent=J.amount>0?BDT(J.amount):'০';
  const n=document.getElementById('jNext');if(n)n.disabled=J.amount===0;
}
function nDel(){
  numStr=numStr.slice(0,-1);J.amount=parseInt(numStr)||0;
  const d=document.getElementById('numDisp');if(d)d.textContent=J.amount>0?BDT(J.amount):'০';
  const n=document.getElementById('jNext');if(n)n.disabled=J.amount===0;
}
function selectType(type){
  J.type=type;
  if(type==='income')J.category='বিক্রয় (Sales)';
  else if(type==='expense')J.category='পণ্য ক্রয়';
  jRender(2);
}
function jDetails(){
  const needParty=J.type==='receivable'||J.type==='payable';
  if(needParty){
    J.party=document.getElementById('j_party')?.value?.trim()||'';
    J.phone=document.getElementById('j_phone')?.value?.trim()||'';
    J.dueDate=document.getElementById('j_due')?.value||'';
    if(!J.party){alert('পার্টির নাম দিন');return;}
  } else {
    J.category=document.getElementById('j_cat')?.value||'';
  }
  J.date=document.getElementById('j_date')?.value||today();
  J.note=document.getElementById('j_note')?.value||'';
  jRender(3);
}

// NOTIFICATIONS
function sendWA(phone,party,amount,dueDate,type){
  const txt=type==='receivable'?'বাকি পাওনা':'বাকি দেনা';
  const msg=`🛒 *${shopName()}*\n\nপ্রিয় *${party}*,\n\nআপনার কাছে *${BDT2(amount)}* টাকা ${txt} আছে।${dueDate?'\nপরিশোধের তারিখ: *'+dueDate+'*':''}\n\nঅনুগ্রহ করে দ্রুত পরিশোধ করুন।\nধন্যবাদ 🙏`;
  let num=phone.replace(/\D/g,'');
  if(num.startsWith('0'))num='880'+num.slice(1);
  if(!num.startsWith('880'))num='880'+num;
  window.open(`https://wa.me/${num}?text=${encodeURIComponent(msg)}`, '_blank');
}
function sendSMS(phone,party,amount,dueDate,type){
  const txt=type==='receivable'?'বাকি পাওনা':'বাকি দেনা';
  const msg=`${shopName()}: প্রিয় ${party}, আপনার কাছে ${BDT2(amount)} টাকা ${txt} আছে।${dueDate?' পরিশোধের তারিখ: '+dueDate+'.':''} ধন্যবাদ।`;
  window.open(`sms:${phone.replace(/\D/g,'')}?body=${encodeURIComponent(msg)}`, '_self');
}

// DELETE / SETTLE
function deleteTxn(id){
  if(!confirm('এই লেনদেন মুছে ফেলবেন?'))return;
  txns=txns.filter(t=>t.id!==id);
  save();updateTopbar();renderContent();
  showToast('মুছে ফেলা হয়েছে','var(--red)');
}
function settleTxn(id){
  txns=txns.map(t=>t.id===id?{...t,settled:true}:t);
  save();renderContent();
  showToast('পরিশোধ সম্পন্ন ✓');
}

// TX CARD
function txCard(t){
  const info=TINFO[t.type];
  const canSettle=(t.type==='receivable'||t.type==='payable')&&!t.settled;
  const hasPhone=t.phone&&t.phone.length>6;
  return`<div class="tx-item">
    <div class="tx-dot" style="background:${info.bg}">${info.icon}</div>
    <div class="tx-info">
      <div class="tx-name">${t.party||t.category||info.label}</div>
      <div class="tx-meta">${t.date}${t.note?' · '+t.note:''}</div>
      <div class="act-row">
        ${canSettle?`<button class="a-btn settle-btn" onclick="settleTxn('${t.id}')">✓ পরিশোধ</button>`:''}
        ${canSettle&&hasPhone?`<button class="a-btn wa-btn" onclick="sendWA('${t.phone}','${t.party}',${t.amount},'${t.dueDate||''}','${t.type}')">📱 WA</button>`:''}
        ${canSettle&&hasPhone?`<button class="a-btn sms-btn" onclick="sendSMS('${t.phone}','${t.party}',${t.amount},'${t.dueDate||''}','${t.type}')">💬 SMS</button>`:''}
        <button class="a-btn del-btn" onclick="deleteTxn('${t.id}')">✕</button>
      </div>
    </div>
    <div class="tx-right">
      <div class="tx-amt" style="color:${info.color}">${BDT(t.amount)}</div>
      ${t.type==='receivable'||t.type==='payable'?`<span class="chip" style="color:${t.settled?'var(--green)':'var(--orange)'};background:${t.settled?'var(--green-bg)':'var(--orange-bg)'}">${t.settled?'পরিশোধ':'বাকি'}</span>`:''}
    </div>
  </div>`;
}

// RENDER
function renderContent(){
  const el=document.getElementById('content');
  if(currentTab==='home') renderHome(el);
  else if(currentTab==='history') renderHistory(el);
  else if(currentTab==='ledger') renderLedger(el);
  else if(currentTab==='report') renderReport(el);
}

      </div>
      <div class="sum-card" style="border-top:3px solid var(--red)" onclick="goTab('history')">
        <div class="sum-icon">🔴</div><div class="sum-label">মোট ব্যয়</div>
        <div class="sum-val" style="color:var(--red)">${BDT(exp)}</div>
        <div class="sum-sub">${txns.filter(t=>t.type==='expense').length} টি</div>
      </div>
      <div class="sum-card" style="border-top:3px solid var(--blue)" onclick="goTab('ledger')">
        <div class="sum-icon">🔵</div><div class="sum-label">পাওনা বাকি</div>
        <div class="sum-val" style="color:var(--blue)">${BDT(pRec.reduce((a,b)=>a+b.amount,0))}</div>

      </div>
      <div class="sum-card" style="border-top:3px solid var(--orange)" onclick="goTab('ledger')">
        <div class="sum-icon">🟠</div><div class="sum-label">দেনা বাকি</div>
        <div class="sum-val" style="color:var(--orange)">${BDT(pPay.reduce((a,b)=>a+b.amount,0))}</div>

    ${!recent.length?`<div class="empty">
      <div class="empty-icon">👆</div>
      <div class="empty-text">নিচের সবুজ <b>＋</b> বাটন চাপুন<br>প্রথম হিসাব যোগ করুন!</div>

function filterH(f){currentFilter=f;renderContent();}

function renderLedger(el){
  const parties={};
  txns.filter(t=>t.type==='receivable'||t.type==='payable').forEach(t=>{
    if(!t.party)return;
    if(!parties[t.party])parties[t.party]={name:t.party,phone:t.phone||'',rec:0,pay:0,entries:[]};
    if(t.type==='receivable'&&!t.settled)parties[t.party].rec+=t.amount;
    if(t.type==='payable'&&!t.settled)parties[t.party].pay+=t.amount;
    parties[t.party].entries.push(t);
  });
  const list=Object.values(parties);
  el.innerHTML=`
    <div style="font-weight:800;font-size:16px;margin-bottom:14px">📒 পার্টি লেজার</div>
    ${!list.length?`<div class="empty"><div class="empty-icon">📒</div><div class="empty-text">কোনো পাওনা/দেনা নেই<br><b>＋</b> বাটন চাপুন যোগ করতে</div></div>`:
    list.map((p,pi)=>{
      const net=p.rec-p.pay;
      return`<div class="led-card">
        <div class="led-head" onclick="togLed(${pi})">
          <div>
            <div style="font-weight:800;font-size:15px">${p.name}</div>
            ${p.phone?`<div style="font-size:11px;color:var(--sub)">📱 ${p.phone}</div>`:''}
            <div style="font-size:11px;color:var(--sub)">${p.entries.length} টি লেনদেন</div>
          </div>
          <div style="text-align:right">
            ${p.rec>0?`<div style="color:var(--blue);font-size:12px;font-weight:700">পাওনা ${BDT(p.rec)}</div>`:''}
            ${p.pay>0?`<div style="color:var(--orange);font-size:12px;font-weight:700">দেনা ${BDT(p.pay)}</div>`:''}
            <div style="font-weight:900;color:${net>=0?'var(--green)':'var(--red)'};font-size:14px;margin-top:4px">
              ${BDT(Math.abs(net))} ${net>=0?'(পাবেন)':'(দেবেন)'}
            </div>
          </div>
        </div>
        <div class="led-body" id="lb-${pi}">
          ${p.phone?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
            <button class="wa-btn" style="padding:10px;font-size:12px;border-radius:10px;text-align:center" onclick="sendWA('${p.phone}','${p.name}',${Math.abs(net)},'','${net>=0?'receivable':'payable'}')">📱 WhatsApp পাঠান</button>
            <button class="sms-btn" style="padding:10px;font-size:12px;border-radius:10px;text-align:center" onclick="sendSMS('${p.phone}','${p.name}',${Math.abs(net)},'','${net>=0?'receivable':'payable'}')">💬 SMS পাঠান</button>
          </div>`:''}
          ${p.entries.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
            <div>
              <span class="chip" style="color:${TINFO[e.type].color};background:${TINFO[e.type].bg}">${TINFO[e.type].label}</span>
              <span style="font-size:11px;color:var(--sub);margin-left:6px">${e.date}</span>
            </div>
            <div style="text-align:right">
              <div style="font-weight:800;color:${TINFO[e.type].color}">${BDT(e.amount)}</div>
              <span class="chip" style="color:${e.settled?'var(--green)':'var(--orange)'};background:${e.settled?'var(--green-bg)':'var(--orange-bg)'}">${e.settled?'পরিশোধ':'বাকি'}</span>
              ${!e.settled?`<br><button class="settle-btn" style="margin-top:5px;padding:5px 10px;border-radius:7px" onclick="settleTxn('${e.id}');renderContent()">✓ পরিশোধ</button>`:''}
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('')}`;
}
function togLed(i){const e=document.getElementById('lb-'+i);if(e)e.style.display=e.style.display==='block'?'none':'block';}

let rMonth='';
function renderReport(el){
  const allM=[...new Set(txns.map(t=>monthOf(t.date)))].sort().reverse();
  if(!rMonth)rMonth=allM[0]||monthOf(today());
  const[yr,mo]=rMonth.split('-');
  const mt=txns.filter(t=>monthOf(t.date)===rMonth);
  const mI=mt.filter(t=>t.type==='income').reduce((a,b)=>a+b.amount,0);
  const mE=mt.filter(t=>t.type==='expense').reduce((a,b)=>a+b.amount,0);
  const mP=mI-mE;
  const BAR=Math.max(mI,mE,1);
  const byCat=arr=>arr.reduce((m,t)=>{const k=t.category||t.party||'অন্যান্য';m[k]=(m[k]||0)+t.amount;return m;},{});
  const ic=byCat(mt.filter(t=>t.type==='income'));
  const ec=byCat(mt.filter(t=>t.type==='expense'));
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-weight:800;font-size:16px">📊 মাসিক রিপোর্ট</div>
      <select style="background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;outline:none;font-family:inherit" onchange="rMonth=this.value;renderContent()">
        ${allM.length?allM.map(m=>{const[y,m2]=m.split('-');return`<option value="${m}"${m===rMonth?' selected':''}>${MONTHS[parseInt(m2)-1]} ${y}</option>`}).join('')
        :`<option value="${rMonth}">${MONTHS[parseInt(mo)-1]} ${yr}</option>`}
      </select>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px">
      ${[{l:'মোট আয়',v:mI,c:'var(--green)'},{l:'মোট ব্যয়',v:mE,c:'var(--red)'},{l:'নিট মুনাফা',v:mP,c:mP>=0?'var(--green)':'var(--red)'}].map(b=>`
        <div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
            <span style="color:var(--sub)">${b.l}</span><span style="font-weight:900;color:${b.c}">${BDT(b.v)}</span>
          </div>
          <div class="bar-track"><div class="bar-fill" style="background:${b.c};width:${Math.min(100,Math.abs(b.v)/BAR*100)}%"></div></div>
        </div>`).join('')}
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px">
      <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:10px">আয়ের বিভাগ</div>
      ${Object.keys(ic).length?Object.entries(ic).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--sub)">${k}</span><span style="font-weight:700;color:var(--green)">${BDT(v)}</span>
        </div>`).join(''):'<div style="color:var(--sub);font-size:13px;padding:8px 0">কোনো আয় নেই</div>'}
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px">
      <div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:10px">ব্যয়ের বিভাগ</div>
      ${Object.keys(ec).length?Object.entries(ec).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`
        <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px">
          <span style="color:var(--sub)">${k}</span><span style="font-weight:700;color:var(--red)">${BDT(v)}</span>
        </div>`).join(''):'<div style="color:var(--sub);font-size:13px;padding:8px 0">কোনো ব্যয় নেই</div>'}
    </div>`;
}

// INIT
updateTopbar();
renderContent();
</script>
</body>
</html>
