<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#16a34a';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, size * 0.18);
  ctx.fill();
  ctx.font = size * 0.45 + 'px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📒', size * 0.5, size * 0.5);
}
window.onload = () => {
  ['c192','c512'].forEach((id, i) => {
    const c = document.getElementById(id);
    drawIcon(c, i === 0 ? 192 : 512);
    const a = document.createElement('a');
    a.href = c.toDataURL('image/png');
    a.download = i === 0 ? 'icon-192.png' : 'icon-512.png';
    document.body.appendChild(a);
    a.click();
  });
  document.body.innerHTML = '<h2 style="font-family:sans-serif;padding:20px">✅ Icons downloaded!</h2>';
};
</script>
</body>
</html>
